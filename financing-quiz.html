<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Financing and Credit Paths Quiz</title><style>:root{--c1:#0369a1;--c2:#0ea5e9;--green:#16a34a;--red:#dc2626;--bg:#f4f7fb;--ink:#0f2032;--muted:#64748b}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}.wrap{max-width:760px;margin:0 auto;padding:28px 18px 60px}.back{display:inline-block;margin-bottom:16px;font-size:13px;color:var(--c1);text-decoration:none;font-weight:600}.head{background:linear-gradient(110deg,var(--c1),var(--c2));color:#fff;border-radius:16px;padding:24px 28px 20px;margin-bottom:24px}.head h1{margin:0 0 6px;font-size:24px}.head p{margin:0;opacity:.9;font-size:14px}.bar{height:8px;background:#e6edf6;border-radius:6px;overflow:hidden;margin:0 0 6px}.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--c1),var(--c2));width:0;transition:.4s}.meta{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:18px}.cat{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--c1);margin-bottom:6px}.card{background:#fff;border-radius:16px;padding:26px;margin-top:6px;box-shadow:0 4px 18px rgba(1,0,32,.07)}.card h2{margin:0 0 18px;font-size:18px;line-height:1.45}.opt{display:flex;align-items:flex-start;width:100%;background:#f8fafc;border:2px solid transparent;border-radius:10px;padding:13px 16px;margin-bottom:10px;font-size:14px;text-align:left;cursor:pointer;transition:.18s;gap:10px;color:var(--ink)}.opt:hover{border-color:var(--c1);background:#f0f9ff}.ltr{display:inline-flex;width:26px;min-width:26px;height:26px;border-radius:50%;background:#e2e8f0;color:var(--muted);font-weight:700;font-size:13px;align-items:center;justify-content:center;flex-shrink:0}.opt.ok{border-color:var(--green);background:#f0fdf4}.opt.ok .ltr{background:var(--green);color:#fff}.opt.no{border-color:var(--red);background:#fef2f2}.opt.no .ltr{background:var(--red);color:#fff}.opt.reveal{border-color:var(--green);background:#f0fdf4}.opt.reveal .ltr{background:var(--green);color:#fff}.btn{display:flex;align-items:center;justify-content:center;padding:13px 28px;background:linear-gradient(110deg,var(--c1),var(--c2));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:14px;width:100%}.fb{margin-top:12px;padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.5;display:none}.fb.ok{background:#dcfce7;color:#166534;display:block}.fb.no{background:#fee2e2;color:#991b1b;display:block}.score-big{font-size:52px;font-weight:800;color:var(--c1)}.pill{display:inline-block;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:10px}.pill.pass{background:#dcfce7;color:#166534}.pill.fail{background:#fee2e2;color:#991b1b}</style></head><body><div class="wrap"><a href="index.html" class="back">Back to Quiz Hub</a><div class="head"><h1>Financing and Credit Paths Quiz</h1><p>10 randomized questions - 80% to pass - every financing option, perfect scenarios, when NOT to use each, and credit paths</p></div><div id="app"></div></div><script>var BANK=[{"cat":"Elective","q":"Elective is the default first choice for most clients. What is the minimum credit score to attempt it?","opts":["480+","550+","620+","700+"],"a":1},{"cat":"Elective","q":"What is the IDEAL scenario to use Elective?","opts":["Client has poor credit and wants no credit check","Client has a 700+ score and wants a clean installment plan up to 18 months","Client wants the lowest monthly payment possible","Client has been declined by everything else"],"a":1},{"cat":"Elective","q":"Elective typically offers up to how many months for well-qualified (700+) applicants?","opts":["6 months","12 months","18 months","36 months"],"a":2},{"cat":"Elective","q":"When should you NOT lead with Elective?","opts":["When the client has a 700+ score","When the client has a score below 550 - it is unlikely to approve and wastes their time","When the client wants an installment plan","When the client is in California"],"a":1},{"cat":"Elective","q":"True or False: Elective is available to California residents.","opts":["True","False"],"a":0},{"cat":"Elective","q":"True or False: Canadian residents can use Elective.","opts":["True","False"],"a":0},{"cat":"Elective","q":"What is the maximum financing limit for Elective?","opts":["$10,000","$15,000","$30,000","No limit"],"a":1},{"cat":"Elective","q":"A client has a 580 score and Elective approves them. This is:","opts":["A bad sign - decline it","A good outcome - proceed and confirm terms","Impossible - Elective never approves below 600","A reason to switch to ClarityPay"],"a":1},{"cat":"Elective","q":"A client in California wants to use Elective. What do you do?","opts":["Proceed - Elective is available to California residents","Switch immediately to ClarityPay","Decline them","It is never available in California"],"a":0},{"cat":"Elective","q":"True or False: You should try Elective for clients with a 480 credit score.","opts":["True","False"],"a":1},{"cat":"Split It","q":"What is the PERFECT scenario to use Split It?","opts":["Client wants 36-month terms with the lowest monthly payment","Client does not want their credit pulled at all and wants simple spread-out payments","Client has a 700+ score","Client has already been declined by Elective and ClarityPay"],"a":1},{"cat":"Split It","q":"What makes Split It unique compared to all other financing options?","opts":["Lowest monthly payments","No credit check and no impact to the client's credit score","Longest repayment term","Best for high credit scores"],"a":1},{"cat":"Split It","q":"A prospect says: I don't want to ding my credit at all. Which option do you lead with?","opts":["Elective","ClarityPay","Split It","Coach Financing"],"a":2},{"cat":"Split It","q":"True or False: Split It charges the full amount in a single monthly payment.","opts":["True","False"],"a":1},{"cat":"Split It","q":"When should you NOT use Split It as your first recommendation?","opts":["When the client wants no credit check","When the client has a 700+ score and wants the cleanest installment plan - Elective is a better fit","When the client wants simple payments","When the client is worried about credit impact"],"a":1},{"cat":"Split It","q":"A client asks: Will this affect my credit score? and you recommend Split It. What do you tell them?","opts":["Yes, like all financing options","No - Split It requires no credit check and does not impact their score","Only if they miss payments","Only on the first application"],"a":1},{"cat":"Split It","q":"What does Split It do with payments compared to a traditional loan?","opts":["Charges everything upfront","Spreads payments out simply over the year with no credit check","Requires a balloon payment at the end","Reports to all three credit bureaus"],"a":1},{"cat":"ClarityPay","q":"What is the PERFECT scenario to use ClarityPay?","opts":["Client wants no credit check","Client wants the lowest possible monthly payments and qualifies at 680+","Client has a 550 score","Client needs same-day funding"],"a":1},{"cat":"ClarityPay","q":"What is the maximum financing limit for ClarityPay?","opts":["$10,000","$15,000","$30,000","$50,000"],"a":2},{"cat":"ClarityPay","q":"What credit score does ClarityPay's 36-month term require?","opts":["600+","620+","680+","No minimum"],"a":2},{"cat":"ClarityPay","q":"When should you pivot to ClarityPay after Elective?","opts":["If the client wants more months or lower monthly payments and qualifies at 680+","If the client has a 480 score","If the client wants no credit check","If the client is Canadian"],"a":0},{"cat":"ClarityPay","q":"A client has a 680+ score and their priority is the lowest monthly payment. Best fit?","opts":["Split It","Elective","Coach Financing","ClarityPay"],"a":3},{"cat":"ClarityPay","q":"When should you NOT lead with ClarityPay?","opts":["When the client has a 680+ score","When the client wants the lowest monthly payment","When the client has a score below 680 - the 36-month term may not approve","When the client wants a 36-month term"],"a":2},{"cat":"ClarityPay","q":"A client asks for the lowest possible monthly payment and has a 710 score. What is the ideal recommendation?","opts":["Coach then Split It","ClarityPay then Elective","Split It then Coach","ClarityPay first - it offers the longest term and lowest payment for a 680+ client"],"a":3},{"cat":"Coach Financing","q":"Coach Financing should be used:","opts":["As the first option for all clients","Only as a last resort when all other options are declined","Whenever the client has a 700+ score","Only for California residents"],"a":1},{"cat":"Coach Financing","q":"What is the PERFECT scenario to use Coach Financing?","opts":["Client has a 700+ score","Client has been declined by Elective, ClarityPay, and Split It is not suitable - it is the safety net","Client wants no credit check","Client wants 18 months"],"a":1},{"cat":"Coach Financing","q":"Why should Coach Financing NOT be the default recommendation?","opts":["It costs more to the company","It can extend up to 144 months which is too long","It should be reserved as a last resort to ensure clients get the best terms from primary options first","It does not approve anyone"],"a":2},{"cat":"Coach Financing","q":"A client has been declined by Elective and ClarityPay, and does not want to use Split It. What is next?","opts":["End the conversation","Offer Pay in Full only","Coach Financing - it is the last-resort safety net","Re-run Elective"],"a":2},{"cat":"Coach Financing","q":"True or False: Coach Financing should be offered before Elective for a client with a 650 score.","opts":["True","False"],"a":1},{"cat":"Coach Financing","q":"Which financing option can extend up to 144 months?","opts":["Elective","Split It","ClarityPay","Coach Financing"],"a":3},{"cat":"Pay in Full","q":"What is the best scenario to recommend Pay in Full?","opts":["Client wants the longest repayment term","Client has cash available and wants to avoid the 15% financing fee entirely","Client has a low credit score","Client wants monthly payments"],"a":1},{"cat":"Pay in Full","q":"What additional cost does a client avoid by paying in full?","opts":["Nothing - same cost","The 15% financing fee added to all financed packages","A $500 admin fee","A credit check"],"a":1},{"cat":"Pay in Full","q":"True or False: Pay in Full is always the best value option for clients who can afford it.","opts":["True - no financing fee means lowest total cost","False - financing fees are waived for everyone"],"a":0},{"cat":"Financing Mechanics","q":"What additional cost applies when a client uses Elective, Split It, or ClarityPay?","opts":["No extra cost","A 5% origination fee","A 15% financing fee to cover provider costs","A monthly service charge"],"a":2},{"cat":"Financing Mechanics","q":"Why is there a 15% financing fee on financed packages?","opts":["To increase company profit margins","To cover the cost that financing providers charge Vendingpreneurs","To deter clients from financing","It only applies to Coach Financing"],"a":1},{"cat":"Financing Mechanics","q":"A client can put $3,000 down but cannot finance the full balance. What is the correct approach?","opts":["Decline them","Partial pay plus finance the remainder","Offer Pay in Full only","Switch to Coach Financing only"],"a":1},{"cat":"Credit Paths","q":"A prospect has a 720 score and wants a clean installment plan. What do you offer first?","opts":["Coach Financing","Split It","Elective","ClarityPay"],"a":2},{"cat":"Credit Paths","q":"A prospect has a 700+ score. What is the recommended financing order?","opts":["Coach then Split It","Elective then ClarityPay then Split It","Split It then Elective","ClarityPay only"],"a":1},{"cat":"Credit Paths","q":"A prospect has a 580 score. What do you lead with?","opts":["Coach Financing","ClarityPay","Elective","Split It"],"a":2},{"cat":"Credit Paths","q":"A prospect has a 580 score and Elective declines. What is the correct next step?","opts":["End the conversation","Try ClarityPay, and ask if Split It or a high-limit card is an option","Go straight to Coach Financing","Offer Pay in Full only"],"a":1},{"cat":"Credit Paths","q":"A prospect's score is below 550. What is the correct approach?","opts":["Lead with Elective","Lead with ClarityPay","Ask if Split It or a high-limit card is possible before going to Coach Financing","Tell them financing is not available"],"a":2},{"cat":"Credit Paths","q":"For a 680+ score client focused on lowest monthly payments, what is the recommended order?","opts":["Split It then Coach","ClarityPay then Elective then Split It","Elective only","Coach then ClarityPay"],"a":1},{"cat":"Credit Paths","q":"A prospect wants to finance but has a 510 score. You try Elective and it declines. What do you ask next?","opts":["Give up","Ask if they have a high-limit credit card or if Split It works, before going to Coach Financing","Immediately offer Coach","Suggest they reapply in 6 months"],"a":1},{"cat":"Scenarios","q":"A client wants to finance but says financing always hurts your credit. What is the most accurate response?","opts":["Yes, all options hurt credit","Not necessarily - Split It has no credit check and does not impact your score at all. Elective and ClarityPay do a check but can be managed responsibly","Always avoid financing","Only Coach Financing affects credit"],"a":1},{"cat":"Scenarios","q":"A client is approved for Elective but asks about ClarityPay. When would switching make sense?","opts":["Never - always stick with Elective","If the client's priority is the lowest monthly payment and they qualify at 680+ - ClarityPay's 36-month term may offer lower payments","If the rates are exactly the same","If the client is Canadian"],"a":1},{"cat":"Scenarios","q":"A client asks: Which option is cheapest overall? What is the correct answer?","opts":["Split It","Elective","ClarityPay","Pay in Full - no 15% financing fee"],"a":3},{"cat":"Scenarios","q":"A tech-challenged client is worried about the application process. Which option has the simplest process?","opts":["Elective - fully online","ClarityPay","Split It - minimal application, no credit check","Coach Financing"],"a":2},{"cat":"Scenarios","q":"A prospect says: I want to spread payments out but absolutely cannot have a hard credit inquiry. What do you recommend?","opts":["Elective","ClarityPay","Split It","Coach Financing"],"a":2}];var NUM=10,PASS=0.8,pool=[],idx=0,score=0,answered=false;function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function start(){pool=shuffle([...BANK]).slice(0,NUM);idx=0;score=0;answered=false;show()}function show(){answered=false;var q=pool[idx];var opts=q.opts.map((o,i)=>'<button class="opt" onclick="pick('+i+')"><span class="ltr">'+String.fromCharCode(65+i)+'</span><span>'+o+'</span></button>').join('');var pct=Math.round((idx/NUM)*100);document.getElementById('app').innerHTML='<div class="meta"><span>Question '+(idx+1)+' of '+NUM+'</span><span>Score: '+score+' / '+idx+'</span></div><div class="bar"><i style="width:'+pct+'%"></i></div><div class="cat">'+q.cat+'</div><div class="card"><h2>'+q.q+'</h2>'+opts+'<div class="fb" id="fb"></div></div><button class="btn" id="nb" onclick="next()" style="display:none">Next</button>'}function pick(i){if(answered)return;answered=true;var q=pool[idx],ok=(i===q.a);if(ok)score++;document.querySelectorAll('.opt').forEach((b,j)=>{if(j===q.a)b.classList.add(ok&&j===i?'ok':'reveal');else if(j===i)b.classList.add('no');b.onclick=null});var fb=document.getElementById('fb');fb.className='fb '+(ok?'ok':'no');fb.textContent=ok?'Correct!':'Incorrect - correct answer: '+q.opts[q.a];document.getElementById('nb').style.display='flex'}function next(){idx++;if(idx>=NUM)results();else show()}function results(){var pct=Math.round((score/NUM)*100),passed=score/NUM>=PASS;document.getElementById('app').innerHTML='<div class="card" style="text-align:center"><div class="pill '+(passed?'pass':'fail')+'">'+(passed?'PASSED':'NOT YET - 80% NEEDED')+'</div><div class="score-big">'+pct+'%</div><p style="margin:8px 0 0;font-weight:600">'+score+' of '+NUM+' correct</p><button class="btn" onclick="start()" style="margin-top:18px">Retake</button><br><br><a href="index.html" style="color:var(--c1);font-size:13px;font-weight:600">Back to Quiz Hub</a></div>'}start();</script></body></html>
