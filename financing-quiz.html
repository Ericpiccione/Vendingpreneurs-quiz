<title>Financing &amp; Credit Paths Quiz – Vendingpreneurs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:36px;max-width:680px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.5)}h1{font-size:1.4rem;color:#f5a623;margin-bottom:6px}.sub{font-size:.85rem;color:#888;margin-bottom:24px}.progress{height:6px;background:#2a2a2a;border-radius:3px;margin-bottom:20px;overflow:hidden}.progress-bar{height:100%;background:#f5a623;border-radius:3px;transition:width .3s}.cat{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#f5a623;margin-bottom:8px}.question{font-size:1.1rem;line-height:1.5;margin-bottom:20px;color:#f0f0f0}.opt{display:flex;align-items:flex-start;gap:10px;width:100%;background:#111;border:1.5px solid #333;border-radius:10px;padding:12px 16px;margin:8px 0;cursor:pointer;text-align:left;color:#f0f0f0;font-size:.95rem;transition:border-color .2s}.opt:hover{border-color:#f5a623}.ltr{font-weight:700;color:#f5a623;min-width:18px}.opt.ok{border-color:#4caf50;background:#0a2a0a;color:#81c784}.opt.ok .ltr{color:#4caf50}.opt.reveal{border-color:#4caf50;background:#0a2a0a;color:#81c784}.opt.reveal .ltr{color:#4caf50}.opt.no{border-color:#e53935;background:#2a0a0a;color:#ef9a9a}.opt.no .ltr{color:#e53935}.explanation{margin-top:16px;padding:14px 18px;background:#1e2a1e;border-left:4px solid #4caf50;border-radius:8px;font-size:.9rem;line-height:1.6;color:#c8e6c9;display:none}.explanation.show{display:block}.explanation.wrong{background:#2a1a1a;border-left-color:#e53935;color:#ffcdd2}.fb-label{font-weight:700;font-size:.85rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.fb-label.correct{color:#4caf50}.fb-label.incorrect{color:#e53935}.next-btn{margin-top:20px;padding:12px 28px;background:#f5a623;border:none;border-radius:8px;color:#000;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s}.next-btn:hover{background:#e0921a}.pill{display:inline-block;background:#2a2a2a;border-radius:20px;padding:3px 12px;font-size:.75rem;margin-right:6px;color:#aaa}.pass{color:#4caf50}.fail{color:#e53935}a.back{display:inline-block;margin-top:20px;color:#888;font-size:.85rem;text-decoration:none}a.back:hover{color:#f5a623}
</style>
</head>
<body>
<div class="card" id="app">
  <h1>💳 Financing &amp; Credit Paths Quiz</h1>
  <p class="sub">10 random questions &bull; 80% to pass &bull; Learn the <em>why</em> behind every answer</p>
  <button class="next-btn" onclick="start()">Start Quiz</button>
  <br><a class="back" href="index.html">← Back to Hub</a>
</div>
<script>
var BANK=[{"cat":"Elective","q":"What is the minimum credit score to attempt Elective financing?","opts":["450","500","550","600"],"a":2,"exp":"550 is the floor for Elective. Below that, Elective will not approve and you are wasting the client's time. At 550 or above, attempt Elective first — it is the default first choice for financing."},{"cat":"Elective","q":"What credit score typically unlocks 18-month installment terms with Elective?","opts":["550","600","650","700"],"a":3,"exp":"700+ scores typically qualify for Elective's 18-month installment plan — the longest and most favorable term. This gives clients manageable monthly payments over a longer window."},{"cat":"Elective","q":"True or False: Elective is the default first financing option for most clients.","opts":["True","False"],"a":0,"exp":"True. Elective is the go-to first option for clients with 550+ credit. It offers installment plans, and at 700+ the terms are excellent. Always start here before offering alternatives."},{"cat":"Elective","q":"A prospect has a 620 credit score. Which financing option should you try first?","opts":["ClarityPay","Coach Financing","Split It","Elective"],"a":3,"exp":"At 620, Elective is the right starting point. The minimum is 550, so they qualify. Start there. Only pivot to ClarityPay or Split It if Elective declines or if the client explicitly wants no credit check."},{"cat":"Elective","q":"When should you NOT lead with Elective?","opts":["When the client has a 700+ score","When the client's credit score is below 550 or they want zero credit impact","When the client prefers installments","When the client is paying a 15% financing fee"],"a":1,"exp":"Do not push Elective if the score is under 550 (they will likely be declined) or if the client explicitly says they do not want a credit inquiry. In those cases, Split It is the natural pivot."},{"cat":"Elective","q":"What happens to the Elective decision when a client's credit score is between 550 and 699?","opts":["Elective always declines","Elective may approve with shorter terms than the 18-month plan available at 700+","Elective automatically approves for 18 months","Elective is not an option in this range"],"a":1,"exp":"550-699 is a gray zone — Elective may approve with shorter terms. The 18-month premium plan is more reliably available at 700+. Set expectations accordingly: approval is possible, but terms may be shorter."},{"cat":"Split It","q":"What is the primary advantage of Split It over Elective?","opts":["Split It has lower interest rates","Split It requires no credit check and does not ding the client's credit score","Split It offers longer terms","Split It is cheaper for the company"],"a":1,"exp":"Split It's biggest selling point is zero credit impact. No credit check, no hard inquiry, no ding to their score. For clients who are credit-sensitive, this is a powerful option."},{"cat":"Split It","q":"True or False: Split It requires a credit check before approval.","opts":["True","False"],"a":1,"exp":"False. Split It has no credit check. This makes it perfect for clients with thin credit files, those rebuilding credit, or anyone who does not want a hard inquiry on their report."},{"cat":"Split It","q":"What is the perfect scenario to offer Split It?","opts":["The client has a 750 credit score and wants the longest terms","The client does not want any impact on their credit, or wants simple easy payments spread over the year","The client has already been declined by ClarityPay","The client wants the absolute lowest monthly payment"],"a":1,"exp":"Split It is ideal when the client says they do not want this to affect their credit or just want simple easy payments. No credit check, straightforward structure, spread over time — ideal for simplicity and credit sensitivity."},{"cat":"Split It","q":"A prospect says: I really do not want a hard inquiry on my credit right now. Which option is best?","opts":["Elective","ClarityPay","Split It","Coach Financing"],"a":2,"exp":"Split It is specifically designed for this situation. No credit check means no hard inquiry. This is the exact use case Split It was built for — lead with it when credit sensitivity comes up."},{"cat":"Split It","q":"When should you NOT use Split It as your first recommendation?","opts":["When a client has no credit history","When a client has a 700+ score and wants the longest possible installment term — Elective's 18-month plan is more favorable","When a client wants simple payments","When a client mentions credit sensitivity"],"a":1,"exp":"If a client has 700+ score and wants the best installment terms, Elective's 18-month plan is the better fit. Split It is great, but Elective's longer structured terms are more favorable for clients who qualify."},{"cat":"Split It","q":"True or False: Split It is a good option for clients who are rebuilding their credit and want to protect their score.","opts":["True","False"],"a":0,"exp":"True. Since Split It has no credit check, it is ideal for clients who are actively protecting or rebuilding their credit. It will not add an inquiry or affect their score in any way."},{"cat":"ClarityPay","q":"What is ClarityPay best known for in the context of Vendingpreneurs financing?","opts":["Fastest approval","Lowest monthly payments over a longer repayment window","No financing fee","Best for clients under 550 credit score"],"a":1,"exp":"ClarityPay is the lowest monthly payment option. It spreads payments over a longer window (up to 36 months), making the monthly number as small as possible — ideal for cash-flow-conscious clients."},{"cat":"ClarityPay","q":"What credit score is typically required to qualify for ClarityPay?","opts":["Any score","550+","620+","680+"],"a":3,"exp":"ClarityPay generally requires 680+ to qualify. It is not the option for lower credit scores — that is where Split It comes in. If a client is below 680, pivot to Split It before going to Coach."},{"cat":"ClarityPay","q":"True or False: ClarityPay is a good fit for a client who says: I need to keep my monthly payment as low as possible.","opts":["True","False"],"a":0,"exp":"True. ClarityPay's 36-month structure minimizes the monthly payment amount. When a client's primary concern is monthly cash flow rather than total financing cost, ClarityPay is the answer."},{"cat":"ClarityPay","q":"A client was declined by Elective and has a 690 credit score. What should you try next?","opts":["Coach Financing","ClarityPay","Split It","Pay in full only"],"a":1,"exp":"At 690 and declined by Elective, ClarityPay is the right next step — the score meets the 680+ threshold. Only move to Split It or Coach if ClarityPay also declines."},{"cat":"ClarityPay","q":"When is ClarityPay NOT the right choice?","opts":["When the client wants low monthly payments","When the client has a 690 score","When the client's score is below 680 — they likely will not qualify","When the client prefers a longer repayment window"],"a":2,"exp":"ClarityPay requires 680+ to qualify. If a client is at 620 or 640, offering ClarityPay sets up a likely decline. Instead, go directly to Split It, which has no credit check at all."},{"cat":"ClarityPay","q":"What is the repayment window for ClarityPay?","opts":["6 months","12 months","24 months","Up to 36 months"],"a":3,"exp":"ClarityPay offers up to 36 months. This longer window is exactly what makes monthly payments so low — spreading the same amount over 3 years vs 12-18 months makes a significant difference in monthly cost."},{"cat":"Coach Financing","q":"In what order should Coach Financing be offered relative to other options?","opts":["First — it is the most reliable","Second after Elective","Always last — it is the option of last resort","Anytime the client mentions money concerns"],"a":2,"exp":"Coach Financing is the last resort. Always exhaust Elective, Split It, and ClarityPay first. Coach should only come up when all other paths have been declined or ruled out."},{"cat":"Coach Financing","q":"True or False: Coach Financing should be mentioned early in the financing conversation as a safety net.","opts":["True","False"],"a":1,"exp":"False. Mentioning Coach early anchors it as a fallback and reduces urgency to try better options. Only introduce Coach after Elective, Split It, and ClarityPay have all been exhausted."},{"cat":"Coach Financing","q":"What should a rep confirm BEFORE escalating to Coach Financing?","opts":["That the client has tried Elective","That Split It and a high-limit card are not viable options, and that Elective and ClarityPay have been attempted","That the client has a low credit score","That the client has been declined once"],"a":1,"exp":"Before going to Coach, confirm: (1) Elective was attempted, (2) ClarityPay was attempted, (3) Split It was considered, (4) a high-limit card or other self-finance option was explored. Coach is truly the last door."},{"cat":"Coach Financing","q":"A client has been declined by Elective and ClarityPay. What should the rep ask BEFORE going to Coach?","opts":["Move directly to Coach Financing","Ask if Split It or a high-limit personal card is an option before escalating to Coach","Suggest they wait and save up","Tell them coaching is not an option"],"a":1,"exp":"Before Coach, always ask about Split It (no credit check) and high-limit cards. These are simpler paths that do not require escalation. Coach is the last resort — exhaust all self-finance alternatives first."},{"cat":"Coach Financing","q":"Why is Coach Financing the last resort instead of a go-to option?","opts":["It has the highest financing fee","It involves more complexity and escalation, and should only be used when all other structured financing paths have been exhausted","It is only for clients over 700 credit score","It takes too long to process"],"a":1,"exp":"Coach Financing exists as a safety valve, not a standard path. It involves internal escalation and should be reserved for genuinely stuck situations. Overusing it creates operational friction and sets wrong expectations."},{"cat":"Pay in Full","q":"What is the main advantage of paying in full vs financing?","opts":["Pay in full gets a discount on the package price","No 15% financing fee — the client pays only the base package price","Pay in full includes extra leads","Pay in full is processed faster"],"a":1,"exp":"Paying in full avoids the 15% financing fee entirely. If a client has the cash, paying outright saves them a meaningful amount. Always present this as a cost savings option, not just a convenience."},{"cat":"Pay in Full","q":"True or False: Clients who finance their package pay the same total amount as those who pay in full.","opts":["True","False"],"a":1,"exp":"False. Financing adds a 15% financing fee to the package price. This covers the cost passed by the financing providers. Clients who can pay in full avoid this additional cost entirely."},{"cat":"Pay in Full","q":"How should a rep frame the 15% financing fee when a client asks about it?","opts":["Minimize it","Be direct: it is a 15% financing fee to cover the cost the financing providers charge us — paying in full is the only way to avoid it","Use technical lending jargon to explain it","Tell them financing is always better"],"a":1,"exp":"Transparency builds trust. The 15% fee is real, it covers provider costs, and the client deserves a clear explanation. Keep it in plain financing fee terms — simple language is easiest for clients to understand. Let them make an informed choice."},{"cat":"Financing Mechanics","q":"Which financing providers are currently active at Vendingpreneurs?","opts":["Elective, Split It, ClarityPay, and Payva","Elective, Klarna, and Split It","Elective, Split It, and ClarityPay (with Coach as last resort)","Payva and ClarityPay"],"a":2,"exp":"The active options are Elective, Split It, and ClarityPay — plus Coach as a last resort. Payva no longer approves clients. Klarna is no longer in the equation. Do not reference them in any client conversation."},{"cat":"Financing Mechanics","q":"True or False: Payva is still a valid financing option for clients.","opts":["True","False"],"a":1,"exp":"False. Payva no longer approves clients regardless of credit score. It is completely removed from the financing toolkit. Never offer or mention Payva to a client."},{"cat":"Financing Mechanics","q":"True or False: Klarna is a current financing option at Vendingpreneurs.","opts":["True","False"],"a":1,"exp":"False. Klarna is no longer in the equation. It has been fully removed. If a client asks about Klarna by name, let them know it is no longer available and guide them to Elective, Split It, or ClarityPay."},{"cat":"Financing Mechanics","q":"A client asks why financing costs more than paying in full. How should you explain it?","opts":["Tell them the fee is unavoidable and standard","Explain that the 15% financing fee covers the cost our financing providers charge us — paying in full is the only way to avoid it","Tell them the fee goes to Vendingpreneurs as profit","Tell them not to worry about it"],"a":1,"exp":"Clients deserve a straight answer. The 15% fee is cost pass-through from the financing providers. You are not making extra margin — you are covering what they charge. Transparency here builds trust."},{"cat":"Credit Paths","q":"A client has a 540 credit score. What is the correct financing path?","opts":["Elective","ClarityPay first, then Elective","Split It or high-limit card before considering Coach — Elective minimum is 550","Coach Financing immediately"],"a":2,"exp":"At 540, Elective will not work (minimum 550). ClarityPay needs 680+. The right move is Split It (no credit check) or exploring a high-limit personal card. Only after those fail should you consider Coach."},{"cat":"Credit Paths","q":"A client has a 720 credit score and wants the longest possible installment plan. Best option?","opts":["Split It","ClarityPay","Elective — 700+ typically qualifies for 18-month installment terms","Coach Financing"],"a":2,"exp":"At 720, Elective's 18-month installment plan is available and optimal. Longest structured terms, good approval odds, and avoids the complexity of ClarityPay or Coach. This is the premium financing scenario."},{"cat":"Credit Paths","q":"A client has a 660 credit score and does not want any credit check. What is the ideal option?","opts":["Elective","ClarityPay","Split It","Coach Financing"],"a":2,"exp":"If a client explicitly says no credit check, Split It is the answer regardless of score. Split It was built for exactly this situation — no inquiry, no impact, simple payments."},{"cat":"Credit Paths","q":"After Elective is declined for a client with a 700 credit score, what is the next step?","opts":["Go directly to Coach","Try ClarityPay — at 700 the score meets the 680+ threshold","Tell the client to pay in full","Give up on financing"],"a":1,"exp":"At 700 and declined by Elective, ClarityPay is the logical next step — the score qualifies. A decline from one provider does not mean decline from all. Always have the full path ready."},{"cat":"Credit Paths","q":"What should a rep explore BEFORE suggesting Coach Financing to a borderline client?","opts":["Nothing — Coach is always ready","Split It (no credit check) and whether a high-limit personal card is available","Only Elective","Only ClarityPay"],"a":1,"exp":"Before Coach, ask about Split It (no credit check needed) and whether the client can use a high-limit personal card. These are simpler paths that do not require escalation. Coach is the last door — check these first."},{"cat":"Credit Paths","q":"A client says: My credit took a hit recently and I am at a 580. What are my options?","opts":["Elective only","Elective (580 is above the 550 minimum) — if declined, pivot to Split It since ClarityPay requires 680+","ClarityPay first","Coach Financing only"],"a":1,"exp":"At 580, start with Elective (above the 550 threshold). If Elective declines, Split It is the next step since it requires no credit check. ClarityPay requires 680+ so it will not work at 580. Know the thresholds."},{"cat":"Scenarios","q":"A client says: I do not have great credit but I really want to get started. What is your opening move?","opts":["Tell them to save up and come back","Ask their credit score — if 550+ try Elective; if they want zero credit impact, offer Split It","Offer Coach Financing immediately","Tell them only pay in full is available"],"a":1,"exp":"Always start by understanding their credit situation. The score determines which door to open first. And even with lower credit, Split It (no credit check) is always available as a viable path."},{"cat":"Scenarios","q":"A client with a 590 credit score is declined by Elective. What do you do next?","opts":["Give up on financing","Try ClarityPay","Offer Split It — no credit check required, still a solid option","Go directly to Coach"],"a":2,"exp":"Elective declined at 590 — ClarityPay requires 680+ so that is not an option. Split It is the move: no credit check, no ding, simple payments. One door closes, another opens. Know the full map."},{"cat":"Scenarios","q":"A high-earning client says: I do not want financing, I will just pay cash. How should you respond?","opts":["Try to convince them to finance anyway","Acknowledge the benefit: paying in full avoids the 15% financing fee — great decision if they have the liquidity","Tell them financing is required","Offer a discount for paying cash"],"a":1,"exp":"Validate the cash decision clearly: no 15% financing fee, no monthly obligation, clean transaction. Clients who can pay in full should be encouraged to do so — it is the financially optimal choice."},{"cat":"Scenarios","q":"A client at 670 credit score says: I want the lowest monthly payment possible. Which option is best?","opts":["Elective","Split It","ClarityPay — up to 36 months minimizes the monthly payment","Coach Financing"],"a":2,"exp":"At 670, ClarityPay qualifies (680+ threshold — close enough to attempt) and its 36-month structure gives the lowest possible monthly payment. When a client's sole goal is minimum monthly cost, ClarityPay is the answer."},{"cat":"Scenarios","q":"A client says: I heard about Klarna — can I use that? How do you respond?","opts":["Offer Klarna immediately","Explain that Klarna is no longer available and walk them through the current options: Elective, Split It, or ClarityPay","Tell them you do not know","Offer Payva instead"],"a":1,"exp":"Klarna and Payva are both removed. When a client asks about them, redirect without drama: say you have updated financing partners, then present Elective, Split It, or ClarityPay."},{"cat":"Scenarios","q":"A rep defaults to offering Coach Financing whenever a client mentions they cannot pay in full. What is wrong with this approach?","opts":["Nothing — Coach is reliable","It skips Elective, Split It, and ClarityPay — all better structured options that should be tried first. Coach is last resort only.","It is fine as long as the client agrees","Coach is actually the best option"],"a":1,"exp":"Jumping to Coach first is a process failure. Elective, Split It, and ClarityPay all exist as better first options. Coach is escalation-level — reserved for when everything else fails. Defaulting to it skips the whole financing framework."},{"cat":"Scenarios","q":"A client has a 710 score and asks: What is the difference between Elective and ClarityPay? How do you explain it?","opts":["They are identical","Elective offers structured installment plans (up to 18 months at 700+) and is the default first choice; ClarityPay offers up to 36 months and focuses on the lowest monthly payment — same 15% fee either way","ClarityPay is free","Elective has no financing fee"],"a":1,"exp":"At 710 both options likely qualify. Elective is the default — good terms, up to 18 months. ClarityPay goes longer (36 months) for lower monthly payments but that means paying longer. Help the client decide based on their priority."},{"cat":"Scenarios","q":"What is the FIRST question a rep should ask before entering any financing conversation?","opts":["What is your monthly income?","Do you want to pay the 15% fee?","What is your approximate credit score? — it determines which options are available","Are you interested in financing?"],"a":2,"exp":"Credit score is the compass for the entire financing conversation. It tells you which doors are open (Elective at 550+, ClarityPay at 680+) and which are not. Starting without this information means flying blind."},{"cat":"Scenarios","q":"True or False: A client who does not want to ding their credit should use Elective.","opts":["True","False"],"a":1,"exp":"False. Elective involves a credit check and therefore affects the client's credit score. For clients who want zero credit impact, Split It is the correct answer — no credit check, no inquiry, no ding."},{"cat":"Scenarios","q":"A client says they have a high-limit credit card and can put it on there. Should you push them toward financing instead?","opts":["Always push financing","No — if they have a high-limit card and are comfortable using it, that is a valid self-finance option that avoids the 15% financing fee and simplifies the process","Tell them cards are not accepted","Offer Elective regardless"],"a":1,"exp":"A high-limit personal card is a legitimate financing path that avoids the 15% fee. Do not push a client into structured financing if they have a simpler, cheaper option available. Always have the client's financial interest in mind."},{"cat":"Payment (FanBasis)","q":"What is the default platform a client uses to submit their payment?","opts":["FanBasis","A direct bank wire","Venmo or Cash App","Whatever the client prefers"],"a":0,"exp":"FanBasis is the default checkout platform for Vendingpreneurs. When a client is ready to pay, the default move is to send them to FanBasis — do not improvise with personal payment apps."},{"cat":"Payment (FanBasis)","q":"True or False: FanBasis is the default platform clients use to pay for their package.","opts":["True","False"],"a":0,"exp":"True. FanBasis is the standard, default checkout platform. Always route the client through FanBasis to collect payment rather than ad-hoc methods."},{"cat":"Payment (FanBasis)","q":"A client says: Okay, I am ready — how do I actually pay you? What is the correct response?","opts":["Ask them to Venmo you directly","Send them the FanBasis checkout link — it is the default payment platform","Tell them to mail a check","Take the card number over the phone"],"a":1,"exp":"When a client is ready to pay, the default is FanBasis. Send them the FanBasis checkout link and walk them through it. This keeps payment clean, tracked, and consistent for every deal."},{"cat":"Payment (FanBasis)","q":"A new rep asks which payment method to default to when closing a deal. What do you tell them?","opts":["Use whatever app the client suggests","Default to FanBasis — it is the standard checkout platform for every deal","Always require a wire transfer","Collect cash in person"],"a":1,"exp":"The default is always FanBasis. New reps should not improvise payment methods. FanBasis is the standard checkout platform — lead with it on every close so payments stay consistent and tracked."}];var NUM=10,PASS=0.8,pool=[],idx=0,score=0,answered=false;function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function start(){pool=shuffle([...BANK]).slice(0,NUM);idx=0;score=0;answered=false;show()}function show(){answered=false;var q=pool[idx];var pct=Math.round((idx/NUM)*100);var opts=q.opts.map((o,i)=>'<button class="opt" onclick="pick('+i+')"><span class="ltr">'+String.fromCharCode(65+i)+'<\/span><span>'+o+'<\/span><\/button>').join('');document.getElementById('app').innerHTML='<div class="cat">'+q.cat+'<\/div><div class="progress"><div class="progress-bar" style="width:'+pct+'%"><\/div><\/div><div class="pill">Question '+(idx+1)+' of '+NUM+'<\/div><div class="question">'+q.q+'<\/div>'+opts+'<div class="explanation" id="exp"><\/div><button class="next-btn" id="nxt" style="display:none" onclick="next()">'+(idx+1<NUM?'Next Question':'See Results')+'<\/button><br><a class="back" href="index.html">← Back to Hub<\/a>'}function pick(i){if(answered)return;answered=true;var q=pool[idx],ok=(i===q.a);if(ok)score++;document.querySelectorAll('.opt').forEach((b,j)=>{if(j===q.a)b.classList.add(ok&&j===i?'ok':'reveal');else if(j===i)b.classList.add('no');b.onclick=null});var exp=document.getElementById('exp');var label=ok?'<div class="fb-label correct">✓ Correct!<\/div>':'<div class="fb-label incorrect">✗ Incorrect — here\'s why:<\/div>';exp.innerHTML=label+q.exp;exp.className='explanation show'+(ok?'':' wrong');document.getElementById('nxt').style.display='inline-block'}function next(){idx++;if(idx>=NUM)results();else show()}function results(){var pct=Math.round((score/NUM)*100),passed=score/NUM>=PASS;document.getElementById('app').innerHTML='<div class="card" style="text-align:center"><div class="pill '+(passed?'pass':'fail')+'" style="font-size:1.1rem;padding:8px 20px;margin-bottom:16px">'+(passed?'🎉 PASSED':'❌ Not Passing Yet')+'<\/div><div style="font-size:2.5rem;font-weight:700;color:'+(passed?'#4caf50':'#e53935')+'">'+pct+'%<\/div><div style="margin:8px 0;color:#aaa">'+score+' / '+NUM+' correct &bull; Need '+Math.ceil(PASS*NUM)+'/'+NUM+' to pass<\/div><button class="next-btn" style="margin-top:20px" onclick="start()">Try Again<\/button><br><a class="back" href="index.html">← Back to Hub<\/a><\/div>'}
</script>
</body>
</html>
