<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Packages and Onboarding Quiz</title><style>:root{--c1:#7c3aed;--c2:#a855f7;--green:#16a34a;--red:#dc2626;--bg:#f4f7fb;--ink:#0f2032;--muted:#64748b}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}.wrap{max-width:760px;margin:0 auto;padding:28px 18px 60px}.back{display:inline-block;margin-bottom:16px;font-size:13px;color:var(--c1);text-decoration:none;font-weight:600}.head{background:linear-gradient(110deg,var(--c1),var(--c2));color:#fff;border-radius:16px;padding:24px 28px 20px;margin-bottom:24px}.head h1{margin:0 0 6px;font-size:24px}.head p{margin:0;opacity:.9;font-size:14px}.bar{height:8px;background:#e6edf6;border-radius:6px;overflow:hidden;margin:0 0 6px}.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--c1),var(--c2));width:0;transition:.4s}.meta{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:18px}.cat{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--c1);margin-bottom:6px}.card{background:#fff;border-radius:16px;padding:26px;margin-top:6px;box-shadow:0 4px 18px rgba(1,0,32,.07)}.card h2{margin:0 0 18px;font-size:18px;line-height:1.45}.opt{display:flex;align-items:flex-start;width:100%;background:#f8fafc;border:2px solid transparent;border-radius:10px;padding:13px 16px;margin-bottom:10px;font-size:14px;text-align:left;cursor:pointer;transition:.18s;gap:10px;color:var(--ink)}.opt:hover{border-color:var(--c1);background:#faf5ff}.ltr{display:inline-flex;width:26px;min-width:26px;height:26px;border-radius:50%;background:#e2e8f0;color:var(--muted);font-weight:700;font-size:13px;align-items:center;justify-content:center;flex-shrink:0}.opt.ok{border-color:var(--green);background:#f0fdf4}.opt.ok .ltr{background:var(--green);color:#fff}.opt.no{border-color:var(--red);background:#fef2f2}.opt.no .ltr{background:var(--red);color:#fff}.opt.reveal{border-color:var(--green);background:#f0fdf4}.opt.reveal .ltr{background:var(--green);color:#fff}.btn{display:flex;align-items:center;justify-content:center;padding:13px 28px;background:linear-gradient(110deg,var(--c1),var(--c2));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:14px;width:100%}.fb{margin-top:12px;padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.5;display:none}.fb.ok{background:#dcfce7;color:#166534;display:block}.fb.no{background:#fee2e2;color:#991b1b;display:block}.score-big{font-size:52px;font-weight:800;color:var(--c1)}.pill{display:inline-block;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:10px}.pill.pass{background:#dcfce7;color:#166534}.pill.fail{background:#fee2e2;color:#991b1b}</style></head><body><div class="wrap"><a href="index.html" class="back">Back to Quiz Hub</a><div class="head"><h1>Packages and Onboarding Quiz</h1><p>10 randomized questions - 80% to pass - pricing, tier value, downsell logic and onboarding workflow</p></div><div id="app"></div></div><script>var BANK=[{"cat":"Pricing","q":"What is the price of the Bronze package?","opts":["$4,997","$5,997","$7,997","$9,997"],"a":1},{"cat":"Pricing","q":"What is the price of the Silver package?","opts":["$7,997","$8,997","$9,997","$11,997"],"a":1},{"cat":"Pricing","q":"What is the price of the Scale package?","opts":["$12,997","$13,997","$14,997","$16,997"],"a":2},{"cat":"Pricing","q":"How much more does Silver cost compared to Bronze?","opts":["$1,000","$2,000","$3,000","$5,000"],"a":2},{"cat":"Pricing","q":"How much more does Scale cost compared to Silver?","opts":["$4,000","$5,000","$6,000","$8,000"],"a":2},{"cat":"Bronze","q":"Which package is the entry/foundational tier to launch your vending business?","opts":["Bronze","Silver","Scale","Starter"],"a":0},{"cat":"Bronze","q":"How many VendScout leads does Bronze include?","opts":["5,000 leads","500 leads","5 leads","200 leads"],"a":2},{"cat":"Bronze","q":"A prospect downsells from Silver to Bronze. What do they lose in terms of leads?","opts":["Nothing, leads are the same","They lose 495 leads (from 500 to 5)","They lose 4,995 leads (from 5,000 to 5)","They lose the Machine Credit"],"a":1},{"cat":"Bronze","q":"True or False: Bronze includes a Machine Add-On / Machine Credit.","opts":["True","False"],"a":1},{"cat":"Bronze","q":"What is the primary risk of a client starting at Bronze?","opts":["Higher monthly fees","Very limited lead access - only 5 VendScout leads to find locations","No community access","No coaching at all"],"a":1},{"cat":"Silver","q":"How many VendScout leads does Silver include?","opts":["5,000","500","5","200"],"a":1},{"cat":"Silver","q":"What is the key lead advantage Silver has over Bronze?","opts":["500 leads vs 5 leads - 100x more location-finding power","A dedicated account manager","Access to the Discord","Free machine credit"],"a":0},{"cat":"Silver","q":"A prospect wants to downgrade from Silver to Bronze to save $3,000. What is the honest impact?","opts":["Minimal - they can always buy leads later","They go from 500 leads to 5 - severely limiting their ability to find locations at scale","They lose the coaching sessions","They lose event access"],"a":1},{"cat":"Silver","q":"True or False: Silver includes a Live Event Ticket.","opts":["True","False"],"a":1},{"cat":"Silver","q":"What does Silver provide that Bronze does not, in terms of lead generation?","opts":["1:1 coaching sessions","495 additional VendScout leads (500 vs 5)","A bi-weekly mastermind","A machine credit"],"a":1},{"cat":"Scale","q":"How many VendScout leads does Scale include?","opts":["5,000","500","5","1,000"],"a":0},{"cat":"Scale","q":"What coaching feature is exclusive to Scale?","opts":["Weekly group coaching","1:1 Coach with an Ambassador (12 Sessions) + Bi-Weekly Mastermind","Email support only","Discord access"],"a":1},{"cat":"Scale","q":"Does Scale include a Live Event Ticket?","opts":["No","Yes","Only if requested","Only for the first 90 days"],"a":1},{"cat":"Scale","q":"A prospect is torn between Silver and Scale. What is the single biggest differentiator?","opts":["Scale is cheaper","Scale includes 1:1 coaching with an Ambassador + Bi-Weekly Mastermind - direct mentorship Silver does not have","Scale has more Discord channels","Scale has a longer refund window"],"a":1},{"cat":"Scale","q":"How many more leads does Scale provide compared to Silver?","opts":["500 more","1,000 more","4,500 more","They are the same"],"a":2},{"cat":"Scale","q":"What does the Machine Add-On / Machine Credit offer?","opts":["Free shipping on machines","Credit toward purchasing vending machines","Discount on VendScout leads","A referral bonus"],"a":1},{"cat":"Downsell Logic","q":"A prospect says: I can't afford Silver, can I start with Bronze? What should you clarify first?","opts":["Just agree and close Bronze","Explain the lead gap - Bronze has 5 leads vs Silver's 500, and ask if that limited start truly serves their goal","Offer a discount on Silver instead","Tell them Bronze is not worth it"],"a":1},{"cat":"Downsell Logic","q":"When is it appropriate to offer Bronze as a genuine recommendation?","opts":["When the prospect seems unsure","When the prospect truly cannot afford Silver and understands the lead limitation","Whenever someone objects to price","Never - always push Silver"],"a":1},{"cat":"Downsell Logic","q":"A client downsells from Scale to Silver. What is the most significant thing they give up?","opts":["500 leads","The Machine Credit","1:1 Ambassador Coaching (12 sessions) and the Bi-Weekly Mastermind","Discord access"],"a":2},{"cat":"Downsell Logic","q":"A prospect on Silver wants to drop to Bronze to save money. You should frame the downsell by explaining:","opts":["Bronze is just as good","The $3,000 difference buys them 495 more leads - potentially worth thousands in machine placement opportunities","They can always upgrade later for free","Bronze is actually the better deal"],"a":1},{"cat":"Downsell Logic","q":"True or False: A rep should present a downsell without clearly communicating what the prospect is giving up.","opts":["True","False"],"a":1},{"cat":"Value Gaps","q":"What is the biggest practical difference between Bronze and Silver for someone actively placing machines?","opts":["Price","VendScout leads: 5 vs 500 - dramatically impacts how many locations you can prospect","Coaching quality","Community size"],"a":1},{"cat":"Value Gaps","q":"A prospect asks: What am I missing if I go Silver instead of Scale? The best answer is:","opts":["Nothing really","You miss 1:1 Ambassador coaching, the Bi-Weekly Mastermind, and 4,500 more leads","You miss the Discord","You miss a slightly lower price"],"a":1},{"cat":"Value Gaps","q":"Which package gives a client the most hands-on mentorship?","opts":["Bronze","Silver","Scale","They all have the same coaching"],"a":2},{"cat":"Value Gaps","q":"Why highlight the Machine Add-On/Credit as a deciding factor?","opts":["It is free","It allows clients to offset machine purchase costs - a tangible financial benefit","It comes with Bronze only","It provides extra leads"],"a":1},{"cat":"Value Gaps","q":"A prospect says: I just want the basics. Which package fits AND what caveat should the rep give?","opts":["Bronze - and no caveat needed","Bronze - but clarify that 5 VendScout leads is very limited; Silver's 500 leads gives a much stronger start","Silver - it is the only real option","Scale - always recommend the highest"],"a":1},{"cat":"Onboarding","q":"After a deal is won, which CRM status should the rep set?","opts":["Lead","Closed-Won","Pending","Follow-Up"],"a":1},{"cat":"Onboarding","q":"What is the proper workflow for marking someone as Closed Won?","opts":["Flip the status immediately after the call","Once payment is made: update all required custom fields in Close CRM, get the PandaDoc signed, download and upload it to the Files section in Close CRM, then flip the opportunity to Closed Won with the dollar value","Send onboarding invites first, then take payment","Mark Closed Won first, then confirm payment"],"a":1},{"cat":"Onboarding","q":"If onboarding invites are NOT being sent automatically, what should the rep do?","opts":["Wait 48 hours","Manually update/resend via Airtable, and reach out to Glenda for invites","Refund the customer","Re-run the sales call"],"a":1},{"cat":"Onboarding","q":"Who do you contact for Customer Success / onboarding invites if they are not being sent?","opts":["Mike","Anthony","Glenda","Tristan"],"a":2},{"cat":"Onboarding","q":"Which resource documents the correct steps to take immediately after a call?","opts":["Pre-Call SOP","Post-Call SOP","Discovery Script","Probing Questions"],"a":1},{"cat":"Onboarding","q":"Which document must be signed before the Closed Won status is set?","opts":["The invoice","The PandaDoc agreement","The welcome email","The onboarding form"],"a":1},{"cat":"Onboarding","q":"Where should the signed PandaDoc be uploaded in Close CRM?","opts":["The Notes section","The Tasks section","The Files section","The Activity feed"],"a":2},{"cat":"Onboarding","q":"True or False: You can flip the opportunity to Closed Won before payment is confirmed.","opts":["True","False"],"a":1},{"cat":"Objections","q":"On a money objection, you should first confirm the prospect:","opts":["Has a credit card","Genuinely believes the solution can get them to their goal","Has talked to their spouse","Wants a refund policy"],"a":1},{"cat":"Objections","q":"For an I have been burned before objection, the best response is:","opts":["Offer a discount","Acknowledge, ask what happened, and re-establish trust with proof","End the call","Skip to closing"],"a":1},{"cat":"Objections","q":"True or False: Handle objections before confirming the prospect's belief in the solution.","opts":["True","False"],"a":1},{"cat":"Objections","q":"A prospect says: I need to think about it. Best next step?","opts":["Say OK and hang up","Ask what specifically they need to think through and address it","Send a follow-up email and wait","Offer a discount immediately"],"a":1},{"cat":"Objections","q":"A prospect wants to downgrade from Silver to Bronze purely to save money. Most effective response?","opts":["Accept the downgrade without discussion","Acknowledge their concern, then clearly explain the lead gap (500 vs 5) and ask if starting with limited resources truly serves their goal","Refuse the downgrade","Offer them a free upgrade later"],"a":1}];var NUM=10,PASS=0.8,pool=[],idx=0,score=0,answered=false;function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function start(){pool=shuffle([...BANK]).slice(0,NUM);idx=0;score=0;answered=false;show()}function show(){answered=false;var q=pool[idx];var opts=q.opts.map((o,i)=>'<button class="opt" onclick="pick('+i+')"><span class="ltr">'+String.fromCharCode(65+i)+'</span><span>'+o+'</span></button>').join('');var pct=Math.round((idx/NUM)*100);document.getElementById('app').innerHTML='<div class="meta"><span>Question '+(idx+1)+' of '+NUM+'</span><span>Score: '+score+' / '+idx+'</span></div><div class="bar"><i style="width:'+pct+'%"></i></div><div class="cat">'+q.cat+'</div><div class="card"><h2>'+q.q+'</h2>'+opts+'<div class="fb" id="fb"></div></div><button class="btn" id="nb" onclick="next()" style="display:none">Next</button>'}function pick(i){if(answered)return;answered=true;var q=pool[idx],ok=(i===q.a);if(ok)score++;document.querySelectorAll('.opt').forEach((b,j)=>{if(j===q.a)b.classList.add(ok&&j===i?'ok':'reveal');else if(j===i)b.classList.add('no');b.onclick=null});var fb=document.getElementById('fb');fb.className='fb '+(ok?'ok':'no');fb.textContent=ok?'Correct!':'Incorrect - correct answer: '+q.opts[q.a];document.getElementById('nb').style.display='flex'}function next(){idx++;if(idx>=NUM)results();else show()}function results(){var pct=Math.round((score/NUM)*100),passed=score/NUM>=PASS;document.getElementById('app').innerHTML='<div class="card" style="text-align:center"><div class="pill '+(passed?'pass':'fail')+'">'+(passed?'PASSED':'NOT YET - 80% NEEDED')+'</div><div class="score-big">'+pct+'%</div><p style="margin:8px 0 0;font-weight:600">'+score+' of '+NUM+' correct</p><button class="btn" onclick="start()" style="margin-top:18px">Retake</button><br><br><a href="index.html" style="color:var(--c1);font-size:13px;font-weight:600">Back to Quiz Hub</a></div>'}start();</script></body></html>
