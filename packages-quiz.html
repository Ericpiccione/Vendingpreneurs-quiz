<!DOCTYPE html>
<html lang="en">
<head>

<title>Packages &amp; Onboarding Quiz – Vendingpreneurs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:36px;max-width:680px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.5)}h1{font-size:1.4rem;color:#f5a623;margin-bottom:6px}.sub{font-size:.85rem;color:#888;margin-bottom:24px}.progress{height:6px;background:#2a2a2a;border-radius:3px;margin-bottom:20px;overflow:hidden}.progress-bar{height:100%;background:#f5a623;border-radius:3px;transition:width .3s}.cat{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#f5a623;margin-bottom:8px}.question{font-size:1.1rem;line-height:1.5;margin-bottom:20px;color:#f0f0f0}.opt{display:flex;align-items:flex-start;gap:10px;width:100%;background:#111;border:1.5px solid #333;border-radius:10px;padding:12px 16px;margin:8px 0;cursor:pointer;text-align:left;color:#f0f0f0;font-size:.95rem;transition:border-color .2s}.opt:hover{border-color:#f5a623}.ltr{font-weight:700;color:#f5a623;min-width:18px}.opt.ok{border-color:#4caf50;background:#0a2a0a;color:#81c784}.opt.ok .ltr{color:#4caf50}.opt.reveal{border-color:#4caf50;background:#0a2a0a;color:#81c784}.opt.reveal .ltr{color:#4caf50}.opt.no{border-color:#e53935;background:#2a0a0a;color:#ef9a9a}.opt.no .ltr{color:#e53935}.explanation{margin-top:16px;padding:14px 18px;background:#1e2a1e;border-left:4px solid #4caf50;border-radius:8px;font-size:.9rem;line-height:1.6;color:#c8e6c9;display:none}.explanation.show{display:block}.explanation.wrong{background:#2a1a1a;border-left-color:#e53935;color:#ffcdd2}.fb-label{font-weight:700;font-size:.85rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.fb-label.correct{color:#4caf50}.fb-label.incorrect{color:#e53935}.next-btn{margin-top:20px;padding:12px 28px;background:#f5a623;border:none;border-radius:8px;color:#000;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s}.next-btn:hover{background:#e0921a}.pill{display:inline-block;background:#2a2a2a;border-radius:20px;padding:3px 12px;font-size:.75rem;margin-right:6px;color:#aaa}.pass{color:#4caf50}.fail{color:#e53935}a.back{display:inline-block;margin-top:20px;color:#888;font-size:.85rem;text-decoration:none}a.back:hover{color:#f5a623}
</style>
</head>
<body>
<div class="card" id="app">
  <h1>📦 Packages &amp; Onboarding Quiz</h1>
  <p class="sub">10 random questions &bull; 80% to pass &bull; Learn the <em>why</em> behind every answer</p>
  <button class="next-btn" onclick="start()">Start Quiz</button>
  <br><a class="back" href="index.html">← Back to Hub</a>
</div>
<script>
var BANK=[{"cat":"Pricing","q":"What is the price of the Bronze package?","opts":["$4,997","$5,997","$7,997","$9,997"],"a":1,"exp":"Bronze is priced at $5,997. It is the entry-level package — more affordable, but limited in leads (5 VendScout leads) and lacks the coaching depth of higher tiers."},{"cat":"Pricing","q":"What is the price of the Silver package?","opts":["$7,997","$8,997","$9,997","$11,997"],"a":1,"exp":"Silver is priced at $8,997. It is the middle tier — 500 VendScout leads and solid training, making it the most common starting point for clients serious about scaling."},{"cat":"Pricing","q":"What is the price of the Scale package?","opts":["$12,997","$13,997","$14,997","$16,997"],"a":2,"exp":"Scale is priced at $14,997. It is the top tier, built for clients who want the most support: 5,000 leads, 1:1 Ambassador coaching, Bi-Weekly Mastermind, and a Machine Add-On/Credit."},{"cat":"Pricing","q":"How much more does Silver cost compared to Bronze?","opts":["$1,000","$2,000","$3,000","$5,000"],"a":2,"exp":"Silver costs $3,000 more than Bronze ($8,997 vs $5,997). That $3,000 buys 495 more VendScout leads — a massive operational advantage when prospecting for locations."},{"cat":"Pricing","q":"How much more does Scale cost compared to Silver?","opts":["$4,000","$5,000","$6,000","$8,000"],"a":2,"exp":"Scale costs $6,000 more than Silver ($14,997 vs $8,997). That gap pays for 1:1 Ambassador coaching, Bi-Weekly Mastermind, 4,500 more leads, and the Machine Add-On/Credit."},{"cat":"Bronze","q":"Which package is the entry/foundational tier to launch your vending business?","opts":["Bronze","Silver","Scale","Starter"],"a":0,"exp":"Bronze is the foundational entry-level package. It gets clients started, but with only 5 VendScout leads, growth is significantly more limited than Silver or Scale."},{"cat":"Bronze","q":"How many VendScout leads does Bronze include?","opts":["5,000 leads","500 leads","5 leads","200 leads"],"a":2,"exp":"Bronze includes only 5 VendScout leads. This is the single biggest limitation of Bronze — without enough leads, finding quality vending locations becomes a grind."},{"cat":"Bronze","q":"A prospect downsells from Silver to Bronze. What do they lose in terms of leads?","opts":["Nothing","495 leads","4,500 leads","5,000 leads"],"a":1,"exp":"Going from Silver (500 leads) to Bronze (5 leads) means losing 495 VendScout leads. That is the core reason reps should frame this downsell carefully — it is not just $3K, it is operational capacity."},{"cat":"Bronze","q":"True or False: Bronze includes 1:1 coaching with a Vendingpreneurs Ambassador.","opts":["True","False"],"a":1,"exp":"False. 1:1 Ambassador coaching is exclusive to the Scale package. Bronze and Silver clients get training and community, but not direct one-on-one mentorship."},{"cat":"Bronze","q":"Does Bronze include access to the Vendingpreneurs Discord community?","opts":["Yes","No"],"a":0,"exp":"Yes, Bronze includes Discord community access. Even at the entry level, clients get peer support — but they lack the 1:1 coaching and Mastermind that Scale provides."},{"cat":"Silver","q":"How many VendScout leads does Silver include?","opts":["5 leads","50 leads","500 leads","5,000 leads"],"a":2,"exp":"Silver includes 500 VendScout leads. This is a 100x increase over Bronze's 5 leads and gives clients a real pipeline to find and secure vending locations."},{"cat":"Silver","q":"True or False: Silver includes 1:1 coaching with a Vendingpreneurs Ambassador.","opts":["True","False"],"a":1,"exp":"False. 1:1 Ambassador coaching is only in Scale. Silver clients get community, training, and 500 leads — but not direct mentorship from an assigned Ambassador."},{"cat":"Silver","q":"What is Silver's main advantage over Bronze?","opts":["Lower price","500 VendScout leads vs Bronze's 5 leads — a 100x improvement in location-finding capacity","Access to Discord","Longer refund window"],"a":1,"exp":"Silver's biggest edge is 500 leads vs Bronze's 5. Location prospecting is the lifeblood of a vending business — 500 leads gives clients a real runway to launch and grow."},{"cat":"Silver","q":"Does Silver include the Machine Add-On / Machine Credit?","opts":["Yes","No"],"a":1,"exp":"No. The Machine Add-On/Credit is exclusive to Scale. It allows Scale clients to offset the cost of purchasing vending machines — a tangible financial benefit Silver does not have."},{"cat":"Silver","q":"What does Silver provide that Bronze does not, in one sentence?","opts":["Cheaper price","500 VendScout leads vs 5, giving a dramatically stronger start for finding locations","A longer refund window","A dedicated account manager"],"a":1,"exp":"The core Silver vs Bronze difference is leads: 500 vs 5. Everything else being equal, Silver clients have a 100x better chance of building a real location pipeline quickly."},{"cat":"Scale","q":"What is the defining feature that makes Scale different from Silver?","opts":["Scale is cheaper","Scale includes 1:1 coaching with an Ambassador + Bi-Weekly Mastermind — direct mentorship Silver does not have","Scale has more Discord channels","Scale has a longer refund window"],"a":1,"exp":"Scale's unique feature is hands-on human support: a personal Ambassador for 1:1 coaching plus Bi-Weekly Masterminds. This is active mentorship, not just tools and training."},{"cat":"Scale","q":"How many more leads does Scale provide compared to Silver?","opts":["500 more","1,000 more","4,500 more","They are the same"],"a":2,"exp":"Scale has 5,000 leads vs Silver's 500 — that is 4,500 more. For clients who want to build at speed, Scale's lead volume is a serious operational advantage."},{"cat":"Scale","q":"What does the Machine Add-On / Machine Credit offer?","opts":["Free shipping on machines","Credit toward purchasing vending machines","Discount on VendScout leads","A referral bonus"],"a":1,"exp":"The Machine Add-On/Credit offsets the cost of buying vending machines. For clients who need machines, this is a real financial benefit that can offset part of the Scale investment."},{"cat":"Scale","q":"True or False: Scale clients attend a Bi-Weekly Mastermind call.","opts":["True","False"],"a":0,"exp":"True. The Bi-Weekly Mastermind is exclusive to Scale. It gives clients regular group coaching with peers and experts — a powerful accountability and growth structure."},{"cat":"Scale","q":"A prospect is on the fence between Silver and Scale. What is the single most compelling argument for Scale?","opts":["The price is the same","Scale adds 1:1 Ambassador coaching, Bi-Weekly Mastermind, 4,500 more leads, and a Machine Credit — direct mentorship that Silver does not have","Scale has better branding","Scale has a money-back guarantee"],"a":1,"exp":"The Scale upgrade is about access to people, not just tools. When a client wants ongoing mentorship and accountability, Scale delivers what Silver structurally cannot — a personal coach."},{"cat":"Downsell Logic","q":"A prospect says: I cannot afford Silver, can I start with Bronze? What should you clarify first?","opts":["Just agree and close Bronze","Explain the lead gap — Bronze has 5 leads vs Silver's 500, and ask if that limited start truly serves their goal","Offer a discount on Silver instead","Tell them Bronze is not worth it"],"a":1,"exp":"Before accepting a downsell, always surface what the prospect is giving up. The lead gap (5 vs 500) is the biggest trade-off. Let them make an informed choice, not just a price-based one."},{"cat":"Downsell Logic","q":"If a prospect downsells from Scale to Silver, what are they walking away from?","opts":["Just a price difference","1:1 Ambassador coaching, Bi-Weekly Mastermind, 4,500 more leads, and the Machine Add-On/Credit","Only the Machine Credit","Nothing significant"],"a":1,"exp":"Downselling from Scale to Silver means losing personal mentorship, mastermind access, 4,500 leads, and the Machine Credit. Frame this clearly — it is not just a price decision."},{"cat":"Downsell Logic","q":"True or False: Downselling is always the right move when a prospect expresses a budget concern.","opts":["True","False"],"a":1,"exp":"False. A budget concern is often a buying signal or a financing opportunity. Explore financing options (Elective, Split It, ClarityPay) before dropping to a lower package — the lower package may not serve their goal."},{"cat":"Downsell Logic","q":"A prospect says Bronze is fine. They want to start small. What is the rep's best response?","opts":["Close Bronze immediately","Acknowledge their caution, then highlight the lead gap: Bronze's 5 leads vs Silver's 500 means a much slower start — confirm Bronze truly serves their goal","Offer a free upgrade to Silver","Tell them Bronze never works"],"a":1,"exp":"Always validate before downselling. Acknowledge the cautious mindset, but ensure the prospect fully understands the lead gap. Bronze can work — but a client who does not know what they are giving up may feel under-served later."},{"cat":"Downsell Logic","q":"What is the risk of not explaining the value gap when downselling?","opts":["No risk","The prospect may regret the lower tier, feel they were undersold, and have a worse outcome — damaging trust","The price goes up","They will ask for a refund immediately"],"a":1,"exp":"Downselling without explaining the gap sets up future resentment. If a Bronze client struggles to find locations (only 5 leads), they may blame the program rather than the package choice. Protect your client and your reputation."},{"cat":"Value Gaps","q":"A prospect asks: What am I missing if I go Silver instead of Scale? The best answer is:","opts":["Nothing really","You miss 1:1 Ambassador coaching, the Bi-Weekly Mastermind, and 4,500 more leads","You miss the Discord","You miss a slightly lower price"],"a":1,"exp":"Silver is a strong package, but Scale adds the human element: a personal Ambassador, a Mastermind, and massively more leads. If the prospect wants active mentorship, Silver cannot match that."},{"cat":"Value Gaps","q":"Which package gives a client the most hands-on mentorship?","opts":["Bronze","Silver","Scale","They all have the same coaching"],"a":2,"exp":"Scale is the only package with 1:1 Ambassador coaching and Bi-Weekly Mastermind. No other tier comes close for hands-on mentorship support."},{"cat":"Value Gaps","q":"Why highlight the Machine Add-On/Credit as a deciding factor?","opts":["It is free","It allows clients to offset machine purchase costs — a tangible financial benefit","It comes with Bronze only","It provides extra leads"],"a":1,"exp":"The Machine Add-On/Credit reduces the effective out-of-pocket cost of starting. Machines are expensive, and any offset is meaningful. For a prospect buying machines anyway, it makes Scale's price gap feel smaller."},{"cat":"Value Gaps","q":"A prospect says: I just want the basics. Which package fits AND what caveat should the rep give?","opts":["Bronze — and no caveat needed","Bronze — but clarify that 5 VendScout leads is very limited; Silver's 500 leads gives a much stronger start","Silver — it is the only real option","Scale — because basics are not enough"],"a":1,"exp":"Bronze is the right fit for basics, but the rep MUST flag the lead limitation. A client who starts with 5 leads may stall out quickly. Informed consent protects the client and the rep's credibility."},{"cat":"Value Gaps","q":"If a Silver prospect asks whether they can upgrade to Scale later, what is the best honest answer?","opts":["No upgrades exist","Yes, but upgrading later means paying full Scale price — starting at Scale now captures all the value from day one","Scale is only for new clients","There is no difference anyway"],"a":1,"exp":"Upgrades are possible but cost more than starting at Scale. If a client is interested in Scale's features, the financially smarter move is usually to start there and get the full value immediately."},{"cat":"Onboarding","q":"What is the correct sequence for the Closed Won workflow after a prospect agrees to move forward?","opts":["Flip to Closed Won first, then collect payment","Payment confirmed, update all required (*) custom fields in Close CRM, get PandaDoc signed, download and upload PandaDoc to Files section in Close CRM, then flip opportunity to Closed Won with dollar value","Send onboarding invites first, then take payment","Mark Closed Won first, then confirm payment"],"a":1,"exp":"The Closed Won workflow has a precise order: (1) confirm payment, (2) update all * custom fields in Close CRM, (3) PandaDoc signed, (4) download and upload PandaDoc to Files in Close CRM, (5) flip to Closed Won with dollar value. Skipping steps creates compliance and handoff issues."},{"cat":"Onboarding","q":"If onboarding invites are NOT being sent automatically, what should the rep do?","opts":["Wait 48 hours","Manually update/resend via Airtable, and reach out to Glenda for invites","Refund the customer","Re-run the sales call"],"a":1,"exp":"When automation fails, reps own the manual fix. Airtable is the source of truth for onboarding status, and Glenda is the point of contact for invite issues. Do not leave new clients waiting."},{"cat":"Onboarding","q":"Who do you contact for Customer Success / onboarding invites if they are not being sent?","opts":["Mike","Anthony","Glenda","Tristan"],"a":2,"exp":"Glenda is the Customer Success point of contact for onboarding invites. Knowing who owns each part of the process is critical — escalate correctly."},{"cat":"Onboarding","q":"Which resource documents the correct steps to take immediately after a call?","opts":["Pre-Call SOP","Post-Call SOP","Discovery Script","Probing Questions"],"a":1,"exp":"The Post-Call SOP is the rep's playbook for everything after a deal closes: custom fields, PandaDoc, uploads, and status update. Referencing it consistently prevents errors."},{"cat":"Onboarding","q":"Which document must be signed before the Closed Won status is set?","opts":["The invoice","The PandaDoc agreement","The welcome email","The onboarding form"],"a":1,"exp":"The PandaDoc must be signed AND uploaded to Close CRM's Files section before flipping the status. The signed agreement is the legal record of the sale — it must be documented before marking complete."},{"cat":"Onboarding","q":"Where should the signed PandaDoc be uploaded in Close CRM?","opts":["The Notes section","The Tasks section","The Files section","The Activity feed"],"a":2,"exp":"The PandaDoc goes in the Files section of Close CRM. This keeps the signed agreement attached directly to the contact record, making it easy for CS and compliance to find."},{"cat":"Onboarding","q":"True or False: You can flip the opportunity to Closed Won before payment is confirmed.","opts":["True","False"],"a":1,"exp":"False. Payment must be confirmed FIRST in the Closed Won workflow. Flipping status before payment creates accounting discrepancies and false pipeline data. Always confirm payment before any other step."},{"cat":"Objections","q":"On a money objection, you should first confirm the prospect:","opts":["Has a credit card","Genuinely believes the solution can get them to their goal","Has talked to their spouse","Wants a refund policy"],"a":1,"exp":"A money objection is only real if the prospect believes in the solution. If they do not believe it will work for them, price is a symptom, not the root problem. Confirm belief first, then solve the money issue."},{"cat":"Objections","q":"For an I have been burned before objection, the best response is:","opts":["Offer a discount","Acknowledge, ask what happened, and re-establish trust with proof","End the call","Skip to closing"],"a":1,"exp":"This is a trust objection, not a price objection. Acknowledge their experience without dismissing it, understand what went wrong, then present specific proof (testimonials, track record) to rebuild confidence."},{"cat":"Objections","q":"True or False: Handle objections before confirming the prospect's belief in the solution.","opts":["True","False"],"a":1,"exp":"False. Always confirm belief first. If the prospect does not believe the solution works, no objection handling will close the deal. Belief is the foundation — objections are solved after it is established."},{"cat":"Objections","q":"A prospect says: I need to think about it. What does this usually signal?","opts":["They are definitely not buying","An unspoken objection that has not been surfaced yet — dig for the real concern","They want a lower price","They need more time to read the materials"],"a":1,"exp":"Think about it almost always masks a real objection. Ask what specifically is holding them back. Surface the real issue, then address it — do not just give them time."},{"cat":"Objections","q":"When a prospect objects to price, what should the rep do BEFORE moving to financing options?","opts":["Immediately offer a discount","Confirm the prospect believes in the value of the solution, then explore financing","Drop to Bronze","End the call and follow up later"],"a":1,"exp":"Price objections require a value check first. If the prospect believes in the outcome, financing is a logical bridge. If they do not believe, offering financing will not fix the real problem — belief always comes first."},{"cat":"Objections","q":"True or False: If a prospect is firmly on Bronze, there is no reason to mention Silver's lead advantage.","opts":["True","False"],"a":1,"exp":"False. A rep's job is to ensure the prospect makes an informed decision. Even if they land on Bronze, they should know what they are giving up (495 leads). Informed decisions protect clients from buyer's regret."}];var NUM=10,PASS=0.8,pool=[],idx=0,score=0,answered=false;function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function start(){pool=shuffle([...BANK]).slice(0,NUM);idx=0;score=0;answered=false;show()}function show(){answered=false;var q=pool[idx];var pct=Math.round((idx/NUM)*100);var opts=q.opts.map((o,i)=>'<button class="opt" onclick="pick('+i+')"><span class="ltr">'+String.fromCharCode(65+i)+'<\/span><span>'+o+'<\/span><\/button>').join('');document.getElementById('app').innerHTML='<div class="cat">'+q.cat+'<\/div><div class="progress"><div class="progress-bar" style="width:'+pct+'%"><\/div><\/div><div class="pill">Question '+(idx+1)+' of '+NUM+'<\/div><div class="question">'+q.q+'<\/div>'+opts+'<div class="explanation" id="exp"><\/div><button class="next-btn" id="nxt" style="display:none" onclick="next()">'+(idx+1<NUM?'Next Question':'See Results')+'<\/button><br><a class="back" href="index.html">← Back to Hub<\/a>'}function pick(i){if(answered)return;answered=true;var q=pool[idx],ok=(i===q.a);if(ok)score++;document.querySelectorAll('.opt').forEach((b,j)=>{if(j===q.a)b.classList.add(ok&&j===i?'ok':'reveal');else if(j===i)b.classList.add('no');b.onclick=null});var exp=document.getElementById('exp');var label=ok?'<div class="fb-label correct">✓ Correct!<\/div>':'<div class="fb-label incorrect">✗ Incorrect — here\'s why:<\/div>';exp.innerHTML=label+q.exp;exp.className='explanation show'+(ok?'':' wrong');document.getElementById('nxt').style.display='inline-block'}function next(){idx++;if(idx>=NUM)results();else show()}function results(){var pct=Math.round((score/NUM)*100),passed=score/NUM>=PASS;document.getElementById('app').innerHTML='<div class="card" style="text-align:center"><div class="pill '+(passed?'pass':'fail')+'" style="font-size:1.1rem;padding:8px 20px;margin-bottom:16px">'+(passed?'🎉 PASSED':'❌ Not Passing Yet')+'<\/div><div style="font-size:2.5rem;font-weight:700;color:'+(passed?'#4caf50':'#e53935')+'">'+pct+'%<\/div><div style="margin:8px 0;color:#aaa">'+score+' / '+NUM+' correct &bull; Need '+Math.ceil(PASS*NUM)+'/'+NUM+' to pass<\/div><button class="next-btn" style="margin-top:20px" onclick="start()">Try Again<\/button><br><a class="back" href="index.html">← Back to Hub<\/a><\/div>'}
</script>
</body>
</html>
