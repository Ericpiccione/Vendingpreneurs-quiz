:700;cursor:pointer;transition:background .2s}.next-btn:hover{background:#e0921a}.pill{display:inline-block;background:#2a2a2a;border-radius:20px;padding:3px 12px;font-size:.75rem;margin-right:6px;color:#aaa}.pass{color:#4caf50}.fail{color:#e53935}a.back{display:inline-block;margin-top:20px;color:#888;font-size:.85rem;text-decoration:none}a.back:hover{color:#f5a623}

<script>
var BANK=[{"cat":"Know the Stories","q":"Who was a geologist working underground in the mines — 12-hour shifts, rotating nights, a 3-hour daily commute — before building a $200K/year vending business?","opts":["Tim Barnes","Manuel","Lane F.","Jesse"],"a":2,"exp":"Lane F. worked underground as a geologist with brutal shifts and a 3-hour commute. He had no sales experience and it took him six months to walk into his first building. Today his route does over $200K/year, his wife runs operations, and one location does $4K/month."},{"cat":"Know the Stories","q":"Lane F. had zero sales experience and took six months just to walk into his first building. Where did his business end up?","opts":["A side hustle doing $1K/month","Over $200K/year, with his wife running operations and a top location doing $4K/month","He sold the route immediately","He quit after the first year"],"a":1,"exp":"Lane is proof that no sales background is not a dealbreaker. Slow start, massive finish: $200K+/year built from a small market, wife running ops, one location alone doing $4K/month."},{"cat":"Know the Stories","q":"Who ran a volatile crypto mining business before building $600K/year in vending revenue with just 18 machines?","opts":["DJ Fuchs","Kyle","Jason","Michael Deese"],"a":3,"exp":"Michael Deese left volatile crypto mining for vending, partnered with his stepson, and built $600K/year with only 18 strategic machines in under 2 years. He is on track for $1M/year — and one of his locations does $70K/year from a single machine."},{"cat":"Know the Stories","q":"Michael Deese's best single machine generates how much?","opts":["$70,000/year","$25,000/year","$200,000/year","$7,000/year"],"a":0,"exp":"One machine, $70K/year. Michael's whole strategy is efficiency-first: premium locations over volume. It is the best proof in the library that location quality beats machine count."},{"cat":"Know the Stories","q":"Who left a global role at Meta, then went FOUR months of pop-ins without a single install before a union training center opened the door to everything?","opts":["Evan","Thyrone Lewis","Javier","Matt Morrison"],"a":1,"exp":"Thyrone Lewis almost quit during four months of pop-ins with zero installs. Then one walk-in at a union training center — using the script — opened three facilities. Eight months in: seven locations, around $12K/month and climbing."},{"cat":"Know the Stories","q":"Who pivoted from running a food truck into vending because of seasonality, scalability, and cash flow?","opts":["Tom","Joe N.","Andy","Jesse"],"a":3,"exp":"Jesse ran a food truck and switched to vending for steadier cash flow and scalability. He landed multiple locations and acquired a route early — his first 30 days are the playbook for moving fast after joining."},{"cat":"Know the Stories","q":"Who is the detective sergeant doing $8K/month at ONE manufacturing plant with just 3 machines — while working full-time?","opts":["Matt Dix","Manuel","Michael Deese","Jason"],"a":1,"exp":"Manuel built an $8K/month location at a manufacturing plant with 3 machines while working as a detective sergeant. He hit 10 locations and $10,500-$11,000/month within 15 months, and now only targets buildings with 200+ people."},{"cat":"Know the Stories","q":"Who did $8,500 in his FIRST month — at his FIRST location — installing about a week after joining?","opts":["Kyle","Moosa Saidy","Javier","Evan"],"a":2,"exp":"Javier joined at the end of February, installed March 4th, and did $8,500 in month one. He leveraged his network, moved fast, and solved a problem the previous operator could not. The speed story of the library."},{"cat":"Know the Stories","q":"Who scaled to 500+ vending machines by BUYING existing routes instead of door knocking?","opts":["Anthony (former real estate entrepreneur)","Jason","Tim Barnes","Graham & Katie"],"a":1,"exp":"Jason left corporate America and grew through route acquisitions — reinvesting cash flow to buy existing routes rather than building location by location. 500+ machines. The story for prospects who would rather buy than knock."},{"cat":"Know the Stories","q":"Who rebuilt after a business bankruptcy to roughly $50K/month using vending and micro markets?","opts":["Tom","Thyrone Lewis","Moosa Saidy","DJ Fuchs"],"a":3,"exp":"DJ Fuchs came back from a business bankruptcy, grew from four machines to 30+ locations, and now does about $50K/month — scaling with micro markets and using community and systems to shorten the learning curve."},{"cat":"Know the Stories","q":"Moosa Saidy lost his mom and his younger brother weeks apart, quit his job, and started over. Where was he less than a year later?","opts":["$5K/month with 2 machines","$41,000/month with 26 machines","He left the program","Still looking for his first location"],"a":1,"exp":"Moosa started in the hardest year of his life and built to $41K/month with 26 machines in under a year. The single most powerful timing story in the library — there is no perfect time, there is only commitment."},{"cat":"Know the Stories","q":"Who left a corporate LEGAL career and built close to $7K/month in his first year?","opts":["Matt Morrison","Andy","Evan","Manuel"],"a":2,"exp":"Evan walked away from corporate law, joined in December 2024, and built to nearly $7K/month within his first year — leaning on mentorship, hands-on training, and the community instead of doing everything himself."},{"cat":"Match the Prospect","q":"A prospect says: I live in a small town — is there even a market for vending here? Whose story do you tell?","opts":["Anthony (former real estate entrepreneur)","Tim Barnes","Lane F. (Bozeman, Montana)","Shannon (Seattle)"],"a":2,"exp":"Lane F. is THE market feasibility story. He built a route doing over $200K/year in Bozeman, Montana — a small market. If a small Montana market supports a $200K route, most towns the prospect is worried about will too."},{"cat":"Match the Prospect","q":"A stay-at-home mom asks whether she could realistically run this around her kids. Whose story fits best?","opts":["Madison","Michael Deese","Tim Barnes","Jason"],"a":0,"exp":"Madison is a stay-at-home mom doing $10-12K/month with just six locations. She chose vending as a low-cost model, keeps her weekly hours light, and found that manufacturing locations are cash cows. Tagged in the library for Stay At Home Parent."},{"cat":"Match the Prospect","q":"A corporate W-2 employee wants to build income BEFORE quitting their job. Best story?","opts":["Joe N. (retired)","Matt Morrison (built ~$43K/month while still working his W2)","Moosa Saidy (quit his job first)","DJ Fuchs"],"a":1,"exp":"Matt Morrison came from corporate sales and built a vending business doing about $43K/month while STILL working his W2 — control over income, predictable revenue, no algorithms. Perfect for the build-before-you-leap prospect."},{"cat":"Match the Prospect","q":"A prospect was just laid off and is between roles, anxious about income. Whose story lands hardest?","opts":["Shannon","Joe N.","Sandy & Joe","Tim Barnes"],"a":3,"exp":"Tim Barnes was out of work with his Airbnb income slowing — both he and his partner between roles. Vending was not the plan, it was the pivot. Now: 41 machines, 34 locations, about $90K/month."},{"cat":"Match the Prospect","q":"A retiree wants something they can run solo at a manageable pace. Who do you point to?","opts":["Javier","Joe N.","Kyle","Graham & Katie"],"a":1,"exp":"Joe N. built 15+ locations doing about $5,500/month in retirement as a solo operator. Low barrier to entry, community support, and a pace he controls — the library's Retired ICP story."},{"cat":"Match the Prospect","q":"A married prospect says their spouse is skeptical about doing this. Whose story do you reach for first?","opts":["Tom","Jesse","Graham & Katie Parker","Manuel"],"a":2,"exp":"Graham and Katie built $36K/month as a couple — they overcame financing challenges and competition together. A spouse-skeptic prospect needs to see a couple winning as a team, and theirs is the flagship couple story."},{"cat":"Match the Prospect","q":"A prospect says: I have never sold anything in my life. Best story?","opts":["Andy (25 years in corporate retail)","Kyle","Lane F.","Anthony (former real estate entrepreneur)"],"a":2,"exp":"Lane F. had zero sales experience — it took him six months to work up to walking into his first building. He still built a $200K/year business. No-sales-background prospects see themselves in Lane."},{"cat":"Match the Prospect","q":"A dad says he wants to build something his kids can be part of. Whose story?","opts":["Matt Dix","Matt Morrison","Jason","Evan"],"a":0,"exp":"Matt Dix left corporate America with 3 kids and a son with neurological processing disorders — he built the business specifically so his son could be part of it, no matter what the future looks like. 10 locations and $20-24K/month in under a year."},{"cat":"Match the Prospect","q":"A parent and adult child want to run a business together. Which story matches?","opts":["Graham & Katie","Madison","Sandy & Joe","Michael Deese"],"a":2,"exp":"Sandy and Joe are the mother-son team — they landed their first locations in a new state, used the program to shorten the learning curve, and built around community partnerships. (Michael Deese also partners with his stepson — a good second mention.)"},{"cat":"Match the Prospect","q":"A prospect is watching AI disruption and layoffs reshape their industry and wants income from assets they control. Whose story?","opts":["Jesse","Joe N.","Lane F.","Tom"],"a":3,"exp":"Tom saw AI and layoffs coming for his industry and decided he needed income from assets he actually controlled. That decision led to vending — and zero to $18,000/month at ONE hotel location."},{"cat":"Match the ICP","q":"In the objection library, Madison's story is tagged for which ICPs?","opts":["Stay At Home Parent + Female VP","Retired + Investor","Blue Collar + Entrepreneur","Military / Law Enforcement"],"a":0,"exp":"Madison is tagged Stay At Home Parent and Female VP. When either of those ICPs is on your calendar, her $10-12K/month with six locations is the prep story."},{"cat":"Match the ICP","q":"Shannon turned one Seattle micro market into $22-25K/month. Which ICP is her story tagged for?","opts":["Retired","Blue Collar","Female VP","Laid Off"],"a":2,"exp":"Shannon is the library's other Female VP story — she built a single strategic micro market into $22-25K/month, then made it semi-passive by hiring stockers and building logistics systems."},{"cat":"Match the ICP","q":"Manuel's story is tagged for which two ICPs?","opts":["Investor + Military / Law Enforcement","Stay At Home Parent + Female VP","Young Professional + Entrepreneur","Retired + Family Biz"],"a":0,"exp":"Manuel is a detective sergeant (Military / Law Enforcement) who runs his route with an investor's discipline — only buildings with 200+ people, ROI-first thinking. He covers both tags in one story."},{"cat":"Match the ICP","q":"Which ICP has the deepest bench of stories in the library — Tim Barnes, Matt Morrison, Thyrone, Evan, Andy, Kyle, Jason, Matt Dix and more?","opts":["Retired","Leaving Corp America / W-2","Stay At Home Parent","Investor"],"a":1,"exp":"Leaving Corp America / W-2 is the most-covered ICP in the library by far. Whatever flavor of corporate escape your prospect is living — laid off, burned out, building on the side, full send — there is a matched story."},{"cat":"Match the ICP","q":"Jesse (food truck to vending) is tagged for which ICP?","opts":["Female VP","Blue Collar","Retired","Investor"],"a":1,"exp":"Jesse is the library's Blue Collar story — a hands-on operator who pivoted from food trucks to vending for better cash flow and scalability, and moved fast in his first 30 days."},{"cat":"Match the ICP","q":"Javier ($8,500 in his first month) speaks to which ICPs?","opts":["Female VP","Retired + Family Biz","Young Professional + Entrepreneur","Laid Off + Blue Collar"],"a":2,"exp":"Javier is tagged Young Professional and Entrepreneur — he leveraged his network, moved decisively, and got results before most people even get started. The story for young, hungry prospects."},{"cat":"Match the ICP","q":"A prospect who was recently LAID OFF books a call. Which stories carry that ICP tag?","opts":["Anthony (former real estate entrepreneur) and DJ Fuchs","Joe N. and Sandy & Joe","Lane F. and Shannon","Tom and Jesse"],"a":0,"exp":"Anthony ($102K/month, 45 locations) and DJ Fuchs ($50K/month after bankruptcy) both carry the Laid Off tag. Both rebuilt from a low point into the biggest revenue stories in the library."},{"cat":"Match the ICP","q":"Michael Deese's story covers which ICP combination?","opts":["Young Professional only","Female VP + Retired","Stay At Home Parent + Investor","Blue Collar + Entrepreneur + Military / Law Enforcement"],"a":3,"exp":"Michael Deese is triple-tagged: Blue Collar, Entrepreneur, and Military / Law Enforcement. With his $600K/year on 18 machines, he is one of the most versatile stories you can carry into a call."},{"cat":"Match the Objection","q":"In the library, Moosa Saidy's story is the flagship answer to which objection?","opts":["Contract / Legal","Price / Budget","Timing","DIY or Competitor"],"a":2,"exp":"Moosa is tagged Timing. He started during the hardest year of his life — losing his mom and brother weeks apart — and still hit $41K/month within a year. When a prospect says now is not a good time, Moosa's story is the answer."},{"cat":"Match the Objection","q":"A prospect has been stuck in analysis paralysis for years — always researching, never starting. Whose story breaks it?","opts":["Michael Deese","Jason","Mallorie","Javier"],"a":2,"exp":"Mallorie and her husband spent TEN YEARS in analysis paralysis — real estate, acquisitions, everything. Vending was the first move that made sense. A physician assistant with two kids under five, she built $4K/month and 6 locations in year one, with a 500-employee law office install coming. Tagged Status Quo and Timing."},{"cat":"Match the Objection","q":"A prospect says: what if I put in months of work and get nothing? Which story pre-handles the slow start honestly?","opts":["Michael Deese","Javier ($8,500 month one)","Shannon","Thyrone Lewis (4 months of pop-ins, zero installs — then breakthrough)"],"a":3,"exp":"Thyrone is the honest slow-start story: four months of nothing, almost quit, then one union training center walk-in opened three facilities. Eight months in he was at seven locations and ~$12K/month. It sets real expectations AND proves persistence pays — far more credible than only telling fast wins."},{"cat":"Match the Objection","q":"A prospect says: I would rather buy something established than knock on doors. Whose story?","opts":["Thyrone Lewis","Jason (scaled to 500+ machines buying routes)","Lane F.","Mallorie"],"a":1,"exp":"Jason grew almost entirely through route acquisitions — buying existing routes and reinvesting cash flow instead of door knocking. Vending has more than one path in, and Jason proves the acquisition path scales to 500+ machines."},{"cat":"Match the Objection","q":"An ROI skeptic wants hard numbers, not hype. Which story is tagged ROI Skepticism and built for this prospect?","opts":["Joe N.","Manuel","Moosa Saidy","Sandy & Joe"],"a":1,"exp":"Manuel is tagged ROI Skepticism. He talks like an analyst: $8K/month from 3 machines at one plant, 10 locations doing $10,500-11,000/month in 15 months, and a hard rule of only targeting 200+ person buildings. Numbers-first prospects respect numbers-first stories."},{"cat":"Match the Objection","q":"A skeptical prospect who got burned by a risky venture before asks if this is even legit. Which Trust / Credibility story fits a hands-on, blue-collar type?","opts":["Evan (corporate law)","Javier","Michael Deese (left volatile crypto mining, built $600K/year)","Madison"],"a":2,"exp":"Michael Deese is tagged Trust / Credibility and Blue Collar. He left the volatility of crypto mining for the boring reliability of vending — 18 machines, $600K/year, on track for $1M. From chaos to predictable cash flow is exactly the arc a burned prospect needs to hear."},{"cat":"Match the Objection","q":"Thyrone Lewis's story is tagged for which objection set?","opts":["Implementation Concerns + DIY or Competitor + Timing","Price / Budget + Contract / Legal","Spouse / Decision Maker only","ROI Skepticism + Trust"],"a":0,"exp":"Thyrone covers Implementation Concerns (the four-month grind), DIY or Competitor (the script, not winging it, is what landed the union training center), and Timing. One of the hardest-working stories in the library."},{"cat":"Match the Objection","q":"A prospect's REAL blocker is their spouse — they are sold, the partner is not. Beyond Graham & Katie, which story shows a family betting on this together despite real stakes?","opts":["Matt Dix (3 kids, stay-at-home wife, son with special needs — bet on himself)","Jesse","Joe N.","Shannon"],"a":0,"exp":"Matt Dix is tagged Spouse / Decision Maker. He left corporate with a stay-at-home wife, three kids, and a son with neurological processing disorders — the highest-stakes family decision in the library, and it paid off: 10 locations, $20-24K/month in under a year."},{"cat":"Match the Objection","q":"True or False: Lane F.'s story is tagged Need / Fit — the objection where a prospect doubts they are the right kind of person for this.","opts":["True","False"],"a":0,"exp":"True. Lane is tagged Need / Fit. A miner with no sales experience who needed six months to attempt his first walk-in is the definitive proof that you do not need to be a natural salesperson to build a $200K/year route."},{"cat":"Markets & Numbers","q":"A prospect doubts a SINGLE location can produce meaningful revenue. Which number shuts that down?","opts":["Andy's 120 days","Jason's 500 machines","Joe N.'s $5,500/month across 15 locations","Tom's $18,000/month at ONE hotel location"],"a":3,"exp":"Tom went from zero to $18K/month at one single hotel location. Back it up with Michael Deese's single machine doing $70K/year and Shannon's one micro market doing $22-25K/month. One great location can outearn ten mediocre ones."},{"cat":"Markets & Numbers","q":"Lane F. built his $200K/year route in what kind of market?","opts":["A small market — Bozeman, Montana","A major Texas metro","New York City","Downtown Seattle"],"a":0,"exp":"Bozeman, Montana — a small market. That is what makes Lane the market-feasibility story: $200K/year did not need a big city, it needed consistent placement work in an underserved market."},{"cat":"Markets & Numbers","q":"Shannon's single micro market in Seattle generates roughly how much per month?","opts":["$50,000+","$2,000-3,000","$8,000-10,000","$22,000-25,000"],"a":3,"exp":"Roughly $22-25K/month from one strategically chosen micro market — then she made it semi-passive with stockers and logistics systems. The premium-location proof point for one-site economics."},{"cat":"Markets & Numbers","q":"A prospect assumes they would need hundreds of machines to make real money. What is the counter-story?","opts":["Anthony's 79 machines","Tim Barnes' 41 machines","Michael Deese — $600K/year with just 18 machines","Jason's 500+ machines"],"a":2,"exp":"Michael Deese does $600K/year with EIGHTEEN machines by being ruthless about location quality. Machine count is vanity; placement quality is sanity. (Jason's 500-machine story is for a different prospect — the buy-not-build type.)"},{"cat":"Markets & Numbers","q":"Madison runs how many locations to generate her $10-12K/month?","opts":["Forty-five","Twenty","Six","One"],"a":2,"exp":"Just six locations. For prospects intimidated by scale, Madison proves a tight, well-chosen route — heavy on manufacturing locations — can produce five figures a month on a stay-at-home parent's schedule."},{"cat":"Markets & Numbers","q":"Anthony (the former real estate entrepreneur) hit what revenue last month, across 45 locations and 79 machines?","opts":["$18,000","Over $102,000","$41,000","$36,000"],"a":1,"exp":"Over $102K in a single month — the biggest monthly number in the library. He went all-in after real estate and credits systems and support for the speed. The ceiling story for high-ambition prospects."},{"cat":"Scenarios","q":"A physician books a call: demanding career, two young kids, no free time. Which story do you prep?","opts":["Mallorie — physician assistant, two kids under five, built $4K/month and 6 locations in year one","Jason — bought routes","Kyle — 30 machines","Moosa — $41K/month"],"a":0,"exp":"Mallorie is the mirror match: full-time PA plus sales roles, two kids under five, two dogs — and still built 6 locations in a year with a 500-employee law office install coming. Same constraints, proven outcome."},{"cat":"Scenarios","q":"A prospect asks: how fast can this realistically work? How do you use Javier's story honestly?","opts":["Share it as what is possible when someone moves fast and leverages their network — alongside a typical-pace story like Thyrone's","Avoid the story — it is too good","Quote it as the average result","Promise them $8,500 in month one"],"a":0,"exp":"Javier ($8,500 in month one) is real but exceptional — he installed within a week and leveraged an existing network. Pair the ceiling with the floor: Thyrone needed four months for his first install. Speed is possible; persistence is required. That honest range builds trust."},{"cat":"Scenarios","q":"You are prepping for a call with a laid-off corporate prospect whose spouse is hesitant. How do you use the objection library?","opts":["Watch one random video for inspiration","Skip prep — improvise on the call","Send the prospect the whole library link","Filter by the Laid Off ICP and Spouse / Decision Maker objection, pick the 1-2 closest stories, and learn their specifics cold"],"a":3,"exp":"That is exactly what the tags are for. Filter ICP + objection, shortlist the matches (Anthony and DJ for Laid Off; Graham & Katie or Matt Dix for spouse), and learn the details — names, numbers, timeline — so you can retell them naturally."},{"cat":"Scenarios","q":"Why does saying Lane's route does over $200K a year in Bozeman, Montana beat saying people in small towns do great with vending?","opts":["A named person, a real number, and a real town are specific and verifiable — vague claims sound like marketing","Reps are required to use numbers","Montana is impressive","It is shorter"],"a":0,"exp":"Specificity is credibility. A name, a number, and a place give the prospect something real to hold onto — and it invites belief instead of skepticism. Every story in the library should be told with its concrete details, not flattened into general claims."},{"cat":"Scenarios","q":"A prospect says: those are cherry-picked success stories. What is the strongest honest response?","opts":["Acknowledge results vary with effort, then point to the RANGE in the library — from Thyrone's four-month grind to Joe N.'s steady $5,500/month to Anthony's $102K month","Deny it and list more wins","Offer a discount","Stop telling stories"],"a":0,"exp":"The library's strength is its range: slow starts (Thyrone), modest steady wins (Joe N., Mallorie), and outliers (Anthony, Michael Deese). Showing the full spread — including the grind — is what makes the wins believable."},{"cat":"Scenarios","q":"A veteran (Military / Law Enforcement ICP) wants proof someone with their background made this work while still serving. Who do you bring up?","opts":["Sandy & Joe","Shannon — Seattle micro market","Evan — corporate law","Manuel — detective sergeant building his route while working full-time"],"a":3,"exp":"Manuel carries the Military / Law Enforcement tag — a full-time detective sergeant who built 10 locations doing $10,500-11,000/month in 15 months. Discipline, systems, and ROI rules — language that resonates with that ICP. Michael Deese also carries the tag as backup."},{"cat":"Scenarios","q":"A prospect heard vending is dead because of competition. Which story shows winning a location a competitor was already failing at?","opts":["Mallorie","Joe N.","Javier — solved a problem the previous operator could not, and did $8,500 his first month there","Moosa Saidy"],"a":2,"exp":"Javier's first location had a previous operator who was failing. He took it over, fixed the service problem, and did $8,500 in month one. Competition is not the threat — bad operators are the opportunity."},{"cat":"Scenarios","q":"True or False: When a story matches the prospect's ICP but not their objection, it will land just as hard.","opts":["True","False"],"a":1,"exp":"False. The strongest match hits both: who the prospect is (ICP) and what they are worried about (objection tag). A same-background story that answers the wrong worry leaves the real concern standing. Use the library's two filters together."}];var NUM=10,PASS=0.8,pool=[],idx=0,score=0,answered=false;function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function start(){pool=shuffle([...BANK]).slice(0,NUM);idx=0;score=0;answered=false;show()}function show(){answered=false;var q=pool[idx];var pct=Math.round((idx/NUM)*100);var opts=q.opts.map((o,i)=>'<button class="opt" onclick="pick('+i+')"><span class="ltr">'+String.fromCharCode(65+i)+'<\/span><span>'+o+'<\/span><\/button>').join('');document.getElementById('app').innerHTML='<div class="cat">'+q.cat+'<\/div><div class="progress"><div class="progress-bar" style="width:'+pct+'%"><\/div><\/div><div class="pill">Question '+(idx+1)+' of '+NUM+'<\/div><div class="question">'+q.q+'<\/div>'+opts+'<div class="explanation" id="exp"><\/div><button class="next-btn" id="nxt" style="display:none" onclick="next()">'+(idx+1<NUM?'Next Question':'See Results')+'<\/button><br><a class="back" href="index.html">← Back to Hub<\/a>'}function pick(i){if(answered)return;answered=true;var q=pool[idx],ok=(i===q.a);if(ok)score++;document.querySelectorAll('.opt').forEach((b,j)=>{if(j===q.a)b.classList.add(ok&&j===i?'ok':'reveal');else if(j===i)b.classList.add('no');b.onclick=null});var exp=document.getElementById('exp');var label=ok?'<div class="fb-label correct">✓ Correct!<\/div>':'<div class="fb-label incorrect">✗ Incorrect — here\'s why:<\/div>';exp.innerHTML=label+q.exp;exp.className='explanation show'+(ok?'':' wrong');document.getElementById('nxt').style.display='inline-block'}function next(){idx++;if(idx>=NUM)results();else show()}function results(){var pct=Math.round((score/NUM)*100),passed=score/NUM>=PASS;document.getElementById('app').innerHTML='<div class="card" style="text-align:center"><div class="pill '+(passed?'pass':'fail')+'" style="font-size:1.1rem;padding:8px 20px;margin-bottom:16px">'+(passed?'🎉 PASSED':'❌ Not Passing Yet')+'<\/div><div style="font-size:2.5rem;font-weight:700;color:'+(passed?'#4caf50':'#e53935')+'">'+pct+'%<\/div><div style="margin:8px 0;color:#aaa">'+score+' / '+NUM+' correct &bull; Need '+Math.ceil(PASS*NUM)+'/'+NUM+' to pass<\/div><button class="next-btn" style="margin-top:20px" onclick="start()">Try Again<\/button><br><a class="back" href="index.html">← Back to Hub<\/a><\/div>'}
</script>
