<title>Testimonials &amp; Case Studies Quiz – Vendingpreneurs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:36px;max-width:680px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.5)}h1{font-size:1.4rem;color:#f5a623;margin-bottom:6px}.sub{font-size:.85rem;color:#888;margin-bottom:24px}.progress{height:6px;background:#2a2a2a;border-radius:3px;margin-bottom:20px;overflow:hidden}.progress-bar{height:100%;background:#f5a623;border-radius:3px;transition:width .3s}.cat{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#f5a623;margin-bottom:8px}.question{font-size:1.1rem;line-height:1.5;margin-bottom:20px;color:#f0f0f0}.opt{display:flex;align-items:flex-start;gap:10px;width:100%;background:#111;border:1.5px solid #333;border-radius:10px;padding:12px 16px;margin:8px 0;cursor:pointer;text-align:left;color:#f0f0f0;font-size:.95rem;transition:border-color .2s}.opt:hover{border-color:#f5a623}.ltr{font-weight:700;color:#f5a623;min-width:18px}.opt.ok{border-color:#4caf50;background:#0a2a0a;color:#81c784}.opt.ok .ltr{color:#4caf50}.opt.reveal{border-color:#4caf50;background:#0a2a0a;color:#81c784}.opt.reveal .ltr{color:#4caf50}.opt.no{border-color:#e53935;background:#2a0a0a;color:#ef9a9a}.opt.no .ltr{color:#e53935}.explanation{margin-top:16px;padding:14px 18px;background:#1e2a1e;border-left:4px solid #4caf50;border-radius:8px;font-size:.9rem;line-height:1.6;color:#c8e6c9;display:none}.explanation.show{display:block}.explanation.wrong{background:#2a1a1a;border-left-color:#e53935;color:#ffcdd2}.fb-label{font-weight:700;font-size:.85rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.fb-label.correct{color:#4caf50}.fb-label.incorrect{color:#e53935}.next-btn{margin-top:20px;padding:12px 28px;background:#f5a623;border:none;border-radius:8px;color:#000;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s}.next-btn:hover{background:#e0921a}.pill{display:inline-block;background:#2a2a2a;border-radius:20px;padding:3px 12px;font-size:.75rem;margin-right:6px;color:#aaa}.pass{color:#4caf50}.fail{color:#e53935}a.back{display:inline-block;margin-top:20px;color:#888;font-size:.85rem;text-decoration:none}a.back:hover{color:#f5a623}
</style>
</head>
<body>
<div class="card" id="app">
  <h1>⭐ Testimonials &amp; Case Studies Quiz</h1>
  <p class="sub">10 random questions &bull; 80% to pass &bull; Learn the <em>why</em> behind every answer</p>
  <button class="next-btn" onclick="start()">Start Quiz</button>
  <br><a class="back" href="index.html">← Back to Hub</a>
</div>
<script>
var BANK=[{"cat":"Why Proof","q":"Why is a client story more persuasive than a rep saying the program works?","opts":["Stories are longer","Prospects expect reps to say good things — a real client result is independent evidence they did not have to take your word for","Stories are required by the sales script","Reps are not allowed to make claims"],"a":1,"exp":"Anything you claim about the program is expected — you are the salesperson. A real client story shifts the proof from your words to someone else's results. That third-party voice is what makes social proof powerful."},{"cat":"Why Proof","q":"What is the core psychological principle behind testimonials and case studies?","opts":["Scarcity","Authority","Social proof — people trust the experiences of people like them","Reciprocity"],"a":2,"exp":"Social proof is the engine. When a prospect sees someone with a similar starting point succeed, their brain concludes: if it worked for them, it can work for me. That belief shift is what opens the door to a close."},{"cat":"Why Proof","q":"True or False: Social proof lands hardest when the prospect sees the client in the story as similar to themselves.","opts":["True","False"],"a":0,"exp":"True. Similarity is the multiplier. A story about someone with the same job situation, budget concerns, or background hits far harder than a story about someone the prospect cannot relate to."},{"cat":"Why Proof","q":"What does a full case study add that a one-line testimonial does not?","opts":["More adjectives","The full journey — where the client started, what obstacles they hit, what actions they took, and the measurable result","A celebrity endorsement","Legal protection"],"a":1,"exp":"A testimonial is a quote. A case study is a journey: before, struggle, action, after. The journey is what lets a prospect map themselves onto the story and picture their own path."},{"cat":"Why Proof","q":"Why does a specific detail (like the number of machines placed or a timeframe) land harder than a general claim like clients do great?","opts":["Specifics sound more impressive","Specific details feel verifiable and real — vague claims sound like marketing","Numbers are easier to remember","Prospects only care about money"],"a":1,"exp":"Specificity equals credibility. Placed 2 machines in their first 90 days sounds true because it is concrete and checkable. Clients do great sounds like every ad the prospect has ever ignored."},{"cat":"Why Proof","q":"True or False: A testimonial works best when read word-for-word like a script.","opts":["True","False"],"a":1,"exp":"False. A story read off a page sounds canned and kills the effect. Know your stories well enough to retell them naturally, like you are telling a friend about someone you know."},{"cat":"Story Selection","q":"What is the single most important factor when choosing which story to share?","opts":["How impressive the results are","How recent the story is","How closely the client in the story matches the prospect's situation and concern","How long the story is"],"a":2,"exp":"Match beats magnitude. The right story mirrors the prospect's situation — same fear, same starting point, same constraint. A perfectly matched modest win outperforms an unmatched blockbuster every time."},{"cat":"Story Selection","q":"A prospect works a demanding full-time job and worries they have no time to build a vending business. Which story do you reach for?","opts":["The biggest revenue story you have","A client who built their route while working full time","A client who quit their job on day one","Any story — they all work"],"a":1,"exp":"Their real objection is time, so the story must prove the time problem is solvable. A client who placed machines while working full time speaks directly to the fear. Revenue numbers do not answer a time objection."},{"cat":"Story Selection","q":"A prospect says they have zero business experience and doubt they can do this. What kind of story fits best?","opts":["A seasoned entrepreneur who scaled fast","A first-time business owner who started from zero and succeeded with the program's guidance","A story about the coaching team's credentials","A story about the vending industry's size"],"a":1,"exp":"They need to see someone like them — a complete beginner — make it work. First-timer stories prove the program is built to carry people without experience, which is exactly what they doubt."},{"cat":"Story Selection","q":"True or False: You should always lead with your most impressive case study.","opts":["True","False"],"a":1,"exp":"False. Outlier results can backfire two ways: they feel unattainable (that could never be me) or they trigger skepticism (sounds too good to be true). Relatable beats remarkable."},{"cat":"Story Selection","q":"A prospect in a small town worries their market is too small for vending. The best story is about:","opts":["A client crushing it in a major city","A client in a similar-sized market who found solid locations","The total number of vending machines in America","A client who relocated to a bigger city"],"a":1,"exp":"A big-city success story confirms their fear — sure, it works THERE. A client winning in a comparable market dismantles the objection directly. Geography-match the proof when location is the concern."},{"cat":"Story Selection","q":"You do not have a story that matches the prospect's exact situation. What do you do?","opts":["Make up a close-enough story","Use your closest real match and honestly acknowledge the difference","Skip stories entirely for this call","Tell them their situation is too unusual"],"a":1,"exp":"Use the nearest real story and name the gap: she was in a different field, but had the same worry about time as you. Honesty about the difference actually adds credibility — and the core proof still lands."},{"cat":"Story Selection","q":"An analytical, detail-oriented prospect is skeptical. Which type of proof fits them best?","opts":["An emotional one-liner about a client who loves the program","A detailed case study with concrete numbers, timeline, and steps taken","More enthusiasm from you","A discount offer"],"a":1,"exp":"Match the proof style to the person. Analytical prospects want data: timeline, machine count, location types, the sequence of steps. Give them a story with structure and specifics they can interrogate."},{"cat":"Story Structure","q":"What is the strongest basic structure for telling a client story?","opts":["Result only — keep it short","Before (where they started) → Struggle (what was in the way) → Action (what they did with the program) → Result","A list of program features the client used","Start with the price they paid"],"a":1,"exp":"Before, struggle, action, result. The before creates identification, the struggle creates believability, the action shows the path, and the result delivers the payoff. Skip a step and the story loses its power."},{"cat":"Story Structure","q":"Why include the client's struggle instead of jumping straight to the result?","opts":["It makes the story longer","Struggle makes the story relatable and believable — perfect stories sound fake","It fills time on the call","It lowers expectations so anything sounds good"],"a":1,"exp":"The struggle is where the prospect sees themselves. A frictionless success story reads as marketing; a story with real obstacles overcome reads as truth. Believability lives in the messy middle."},{"cat":"Story Structure","q":"True or False: The more detail you pack into a story, the more persuasive it becomes.","opts":["True","False"],"a":1,"exp":"False. Past a point, detail becomes noise and the prospect tunes out. Keep the story tight — around 60 to 90 seconds — and include only details relevant to THIS prospect's concern."},{"cat":"Story Structure","q":"Which version of a result is most credible?","opts":["He made a ton of money really fast","He did incredibly well, like everyone in the program","Within his first few months he had machines placed in two gyms and a salon near his house","He is rich now"],"a":2,"exp":"Concrete beats superlative. A timeframe plus a countable result plus recognizable location types feels real and verifiable. Vague hype phrases trigger the prospect's scam radar."},{"cat":"Story Structure","q":"How should every client story end?","opts":["With the program price","With a bridge back to the prospect — connecting the story to their situation, usually with a question","With another story","With a long pause"],"a":1,"exp":"A story without a bridge is just entertainment. End by connecting it: she started exactly where you are — how close is that to your situation? The bridge converts the story into forward motion."},{"cat":"Story Structure","q":"What makes a strong opening hook for a case study?","opts":["A detail the prospect cares about — a result or a starting point that mirrors theirs","The client's full name and hometown","An apology for telling a story","The date you heard the story"],"a":0,"exp":"Earn attention in the first sentence. Lead with the thing the prospect cares about most — a relatable starting point (he was working 50-hour weeks too) or a compelling result. Then unpack the journey."},{"cat":"Story Structure","q":"True or False: A good story should mention the specific obstacle the client overcame when that obstacle matches the prospect's objection.","opts":["True","False"],"a":0,"exp":"True. That is the entire targeting logic. If the prospect fears the time commitment, the story must show the time obstacle being beaten. The matched obstacle is the active ingredient — do not leave it out."},{"cat":"Delivery & Timing","q":"When is the highest-impact moment to share a client story?","opts":["In the first 30 seconds of every call","Right after a specific concern or objection surfaces — matched to that exact concern","Only at the very end of the call","Whenever there is silence to fill"],"a":1,"exp":"A story is an answer, and answers land when there is a live question. Surface the concern first, then deploy the story that resolves it. Random stories sprayed through a call feel like a pitch."},{"cat":"Delivery & Timing","q":"True or False: Stacking three or four testimonials back-to-back multiplies the persuasive effect.","opts":["True","False"],"a":1,"exp":"False. One well-matched story lands; a pile of stories feels like being sold. If the first matched story does not move them, the issue is usually an unsurfaced objection — more stories will not fix that."},{"cat":"Delivery & Timing","q":"Roughly how long should a client story take on a live call?","opts":["15 seconds","60 to 90 seconds","Five minutes minimum","As long as possible"],"a":1,"exp":"60 to 90 seconds is the sweet spot — long enough for before, struggle, action, result, short enough to hold attention and get back to the conversation. A story is a tool inside the call, not the call itself."},{"cat":"Delivery & Timing","q":"What should your tone be when telling a client story?","opts":["Formal, like a press release","Conversational — like telling a friend about someone you know","Dramatic, with a big buildup","Fast, to get it over with"],"a":1,"exp":"Natural retelling is what makes it believable. The moment it sounds rehearsed or scripted, the prospect mentally files it under marketing. Know the story cold so you can tell it loose."},{"cat":"Delivery & Timing","q":"You just finished telling a story. What is the next move?","opts":["Go straight into pricing","Tell a second story to be safe","Ask a question that re-engages them — like how close is that to your situation?","Wait for them to speak first"],"a":2,"exp":"Always bridge with a question. It checks whether the story resonated, re-engages the prospect as a participant, and often surfaces the next layer of the real objection. Story, then question — every time."},{"cat":"Delivery & Timing","q":"True or False: Stories are only useful for handling objections.","opts":["True","False"],"a":1,"exp":"False. Stories also build belief early — during discovery, a quick story can plant proof before objections even form. Objection handling is one use; belief building is the other half of the job."},{"cat":"Delivery & Timing","q":"The prospect interrupts your story with a question. What do you do?","opts":["Ask them to hold questions until the end","Answer it — an interruption usually means engagement — then finish the story only if it is still relevant","Start the story over","Ignore the question and keep going"],"a":1,"exp":"An interruption is a buying signal — they are processing. Answer the question, and only return to the story if it still serves the conversation. The story serves the prospect, not the other way around."},{"cat":"Objection Pairing","q":"A prospect says: it is too expensive. Which story do you pair with this?","opts":["A story about a client who got a discount","A client who treated the package as an investment and earned it back through machine placements and revenue","A story about how expensive competitors are","A client who paid in full without blinking"],"a":1,"exp":"Price objections are value objections in disguise. The right story reframes the package from a cost into an investment by showing a client whose placements paid it back. Proof of return shrinks the price."},{"cat":"Objection Pairing","q":"A prospect says: I do not have time for this. Best story pairing?","opts":["A retiree with unlimited free time","A client who built their vending route in spare hours around a full-time job","The fastest success story you have","A client who hired everything out"],"a":1,"exp":"Show someone who succeeded inside the same constraint. A full-time worker who placed machines on evenings and weekends proves the time objection is beatable — without you having to argue about it."},{"cat":"Objection Pairing","q":"A prospect says: I have been burned by a program before — how do I know this is not a scam? Best response?","opts":["Get defensive about the company","Acknowledge their caution, then share a story of a client who was equally skeptical, did their diligence, and succeeded","Offer to lower the price","Change the subject quickly"],"a":1,"exp":"This is a trust objection. Validate the caution first — it is reasonable. Then the matched story: a client who came in skeptical after a bad experience elsewhere. Their arc from doubt to results is the exact bridge this prospect needs."},{"cat":"Objection Pairing","q":"A prospect asks: will this actually work in my area? Pair with:","opts":["National vending industry statistics","A story about a client in a comparable market or region finding solid locations","Your personal opinion of their city","A story from the biggest city in the country"],"a":1,"exp":"Location objections need location-matched proof. A client in a similar market who found placements answers the real question: is there opportunity where I live? Stats and opinions do not carry that weight."},{"cat":"Objection Pairing","q":"A prospect says: I can figure this out myself with YouTube. Which story fits?","opts":["Agree that YouTube is enough","A client who tried the DIY route first, hit walls for months, then joined and accelerated with leads and guidance","A story mocking people who use YouTube","The cheapest package pitch"],"a":1,"exp":"Do not argue with DIY — outflank it. The tried-it-alone-first story validates their instinct while showing the hidden cost: time lost, mistakes made, locations missed. The program is the shortcut they could not see."},{"cat":"Objection Pairing","q":"True or False: The best response to a price objection is offering a discount.","opts":["True","False"],"a":1,"exp":"False. Discounting trains prospects to mistrust the price and skips the real issue: they do not yet see the value. Proof — an ROI story — addresses the actual objection. Discounts buy deals; proof builds believers."},{"cat":"Objection Pairing","q":"A prospect says: I need to talk to my spouse first. Which story helps most?","opts":["A client who hid the purchase from their spouse","A client whose spouse had the same hesitation, and how reviewing the opportunity together got them aligned and started","A story about acting fast before talking to anyone","No story — just end the call"],"a":1,"exp":"Respect the spouse conversation — it is real. The matched story shows a couple who navigated the same moment and came out aligned. It also opens the door to offer: would it help to walk through it together with both of you?"},{"cat":"Objection Pairing","q":"A prospect says: I need to think about it. When should the story come in?","opts":["Immediately — tell your best story before they hang up","After you surface what they actually need to think about — then match the story to that real concern","Never — thinking it over cannot be addressed","Send five testimonials by email instead"],"a":1,"exp":"I need to think about it almost always hides a specific unspoken objection. A story fired blind is a shot in the dark. Ask what is giving them pause first — then deploy the story that matches the real concern."},{"cat":"Honesty & Trust","q":"True or False: It is acceptable to embellish a client story if it is directionally true.","opts":["True","False"],"a":1,"exp":"False. Never. One caught exaggeration retroactively poisons every true thing you said and every story the company tells. Real stories, told accurately, are the only sustainable play — and there are plenty of them."},{"cat":"Honesty & Trust","q":"How should you frame a client's results when telling their story?","opts":["Promise the prospect will get the same outcome","Present it as what that client achieved with their effort — results vary, and the story shows what is possible, not what is guaranteed","Round the numbers up for impact","Keep results vague so nobody can check"],"a":1,"exp":"Tell the story straight: this is what that client did, and they put in the work. It shows what is possible without promising outcomes. Honest framing protects trust on the call and the company's reputation after it."},{"cat":"Honesty & Trust","q":"You are mid-story and cannot remember a specific number. What do you do?","opts":["Guess a number that sounds right","Stick to what you actually know and keep the story honest — never fabricate specifics","Make the number bigger to be safe","Abandon the story"],"a":1,"exp":"Say what you know: I do not remember the exact count, but he had multiple machines placed within his first few months. Honest imprecision beats invented precision — fabricated details have a way of surfacing later."},{"cat":"Honesty & Trust","q":"True or False: A story where the client struggled or moved slower than expected can actually help the sale.","opts":["True","False"],"a":0,"exp":"True. Realistic stories set honest expectations, build trust, and pre-empt buyer remorse. A client who started slow and pushed through often persuades better than a rocket-ship story — because it is believable."},{"cat":"Honesty & Trust","q":"What should reps do to keep their story library strong?","opts":["Reuse the same two stories forever","Regularly collect fresh, real client wins from the team and community, and learn the details well enough to retell them naturally","Write hypothetical stories for practice","Wait for the company to hand out a script"],"a":1,"exp":"Stories age and prospects vary. The best closers maintain a living library: fresh wins from the community, different client profiles, different objections beaten. The more real stories you carry, the better your match rate."},{"cat":"Scenarios","q":"A prospect asks: do you have anyone like me — a teacher with no business background? You do not have a teacher story. Best move?","opts":["Invent a teacher client","Share your closest real match — another first-timer from a non-business career — and note honestly that the program is built for people starting from zero","Say no and move on","Tell them teachers are not a fit"],"a":1,"exp":"Closest honest match plus an honest gap-acknowledgment. A nurse or warehouse worker who started from zero carries the same proof for a teacher: no business background required. The honesty makes the proof stronger, not weaker."},{"cat":"Scenarios","q":"A rep tells the same dramatic success story to every prospect regardless of their situation. What is the problem?","opts":["Nothing — it is the best story","Mismatch. A story that does not mirror the prospect's concern does not move them, and an outlier result can trigger skepticism instead of belief","The story is too short","Dramatic stories are banned"],"a":1,"exp":"One-story-fits-all is the most common story mistake. Relevance beats impressiveness — the story must answer THIS prospect's live concern. The biggest result in your library is often the worst opener."},{"cat":"Scenarios","q":"You finish a story and the prospect goes quiet. What do you do?","opts":["Tell another story immediately","Ask a bridging question — something like how close is that to where you are right now?","Start talking about price","Assume the deal is dead"],"a":1,"exp":"Silence after a story usually means processing. A bridge question turns that processing into conversation and tells you whether the story landed or whether a deeper concern is still hiding."},{"cat":"Scenarios","q":"A prospect says: those stories are cherry-picked — you only tell the wins. How do you respond?","opts":["Deny it","Acknowledge it is a fair challenge, be honest that results depend on effort, and share a realistic picture of the typical journey including the work involved","Pile on three more success stories","End the call"],"a":1,"exp":"It IS a fair challenge — meet it with honesty. Results track effort, some clients move slow, and the program provides the path but not the hustle. That level of candor is itself the most persuasive proof you can offer a skeptic."},{"cat":"Scenarios","q":"You told a well-matched story and the prospect seems completely unmoved. Most likely explanation?","opts":["Stories do not work on this person","The real objection has not surfaced yet — go back to discovery questions before reaching for more proof","You need a more dramatic story","They were not listening"],"a":1,"exp":"When matched proof bounces off, the concern you matched is usually not the real concern. More stories will not fix an undiagnosed objection. Get curious, ask questions, find the real blocker — then match again."},{"cat":"Scenarios","q":"True or False: A great case study can replace discovery questions.","opts":["True","False"],"a":1,"exp":"False. Discovery is what tells you WHICH story to use. Stories deployed without understanding the prospect are guesses. Diagnose first, then prescribe — proof is the prescription, not the exam."},{"cat":"Scenarios","q":"A prospect asks if they can talk to a real client or see proof beyond your stories. How should you react?","opts":["Treat it as an insult","Welcome it — point them to public client wins, the community, and reviews where available. Willingness to show proof is itself trust-building","Refuse and push for the close","Stall until they forget"],"a":1,"exp":"Never flinch at a proof request — flinching reads as hiding. Enthusiastically pointing to public wins, community activity, and reviews signals you have nothing to hide, and that confidence often satisfies the concern by itself."}];var NUM=10,PASS=0.8,pool=[],idx=0,score=0,answered=false;function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function start(){pool=shuffle([...BANK]).slice(0,NUM);idx=0;score=0;answered=false;show()}function show(){answered=false;var q=pool[idx];var pct=Math.round((idx/NUM)*100);var opts=q.opts.map((o,i)=>'<button class="opt" onclick="pick('+i+')"><span class="ltr">'+String.fromCharCode(65+i)+'<\/span><span>'+o+'<\/span><\/button>').join('');document.getElementById('app').innerHTML='<div class="cat">'+q.cat+'<\/div><div class="progress"><div class="progress-bar" style="width:'+pct+'%"><\/div><\/div><div class="pill">Question '+(idx+1)+' of '+NUM+'<\/div><div class="question">'+q.q+'<\/div>'+opts+'<div class="explanation" id="exp"><\/div><button class="next-btn" id="nxt" style="display:none" onclick="next()">'+(idx+1<NUM?'Next Question':'See Results')+'<\/button><br><a class="back" href="index.html">← Back to Hub<\/a>'}function pick(i){if(answered)return;answered=true;var q=pool[idx],ok=(i===q.a);if(ok)score++;document.querySelectorAll('.opt').forEach((b,j)=>{if(j===q.a)b.classList.add(ok&&j===i?'ok':'reveal');else if(j===i)b.classList.add('no');b.onclick=null});var exp=document.getElementById('exp');var label=ok?'<div class="fb-label correct">✓ Correct!<\/div>':'<div class="fb-label incorrect">✗ Incorrect — here\'s why:<\/div>';exp.innerHTML=label+q.exp;exp.className='explanation show'+(ok?'':' wrong');document.getElementById('nxt').style.display='inline-block'}function next(){idx++;if(idx>=NUM)results();else show()}function results(){var pct=Math.round((score/NUM)*100),passed=score/NUM>=PASS;document.getElementById('app').innerHTML='<div class="card" style="text-align:center"><div class="pill '+(passed?'pass':'fail')+'" style="font-size:1.1rem;padding:8px 20px;margin-bottom:16px">'+(passed?'🎉 PASSED':'❌ Not Passing Yet')+'<\/div><div style="font-size:2.5rem;font-weight:700;color:'+(passed?'#4caf50':'#e53935')+'">'+pct+'%<\/div><div style="margin:8px 0;color:#aaa">'+score+' / '+NUM+' correct &bull; Need '+Math.ceil(PASS*NUM)+'/'+NUM+' to pass<\/div><button class="next-btn" style="margin-top:20px" onclick="start()">Try Again<\/button><br><a class="back" href="index.html">← Back to Hub<\/a><\/div>'}
</script>
</body>
</html>
